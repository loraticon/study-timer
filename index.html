<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코지 카페 타이머 - Loraticon Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        .coffee-cup { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05)); }
        .dark .coffee-cup { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }
        .mode-tab { transition: color 0.2s; }
        .mode-slider { transition: transform 0.25s cubic-bezier(.4,0,.2,1); }
        .subject-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: #FDFBF7;
            border: 1px solid #EBE8DE;
            border-radius: 1rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            z-index: 50;
            overflow: hidden;
        }
        .dark .subject-dropdown { background: #27272a; border-color: #3f3f46; }
        .subject-option { padding: 10px 16px; cursor: pointer; font-size: 0.875rem; transition: background 0.15s; }
        .subject-option:hover { background: #F4F0EA; }
        .dark .subject-option:hover { background: #3f3f46; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .toast { animation: slideUp 0.3s ease; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex justify-center items-center p-4"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const PauseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
        const SkipIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>;
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const ChevronIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const BookIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>;

        const THEMES = {
            latte:    { id: 'latte',    name: '카페 라떼',  bg: 'bg-[#A67B5B]', hover: 'hover:bg-[#8B664B]', hex: '#A67B5B', ring: 'ring-[#A67B5B]' },
            matcha:   { id: 'matcha',   name: '말차 라떼',  bg: 'bg-[#849F71]', hover: 'hover:bg-[#738C62]', hex: '#849F71', ring: 'ring-[#849F71]' },
            choco:    { id: 'choco',    name: '초코 라떼',  bg: 'bg-[#5C3A21]', hover: 'hover:bg-[#4A2E1A]', hex: '#5C3A21', ring: 'ring-[#5C3A21]' },
            berry:    { id: 'berry',    name: '딸기 라떼',  bg: 'bg-[#D98891]', hover: 'hover:bg-[#C2737D]', hex: '#D98891', ring: 'ring-[#D98891]' },
            earlgrey: { id: 'earlgrey', name: '밀크티',     bg: 'bg-[#D4A373]', hover: 'hover:bg-[#B88B5E]', hex: '#D4A373', ring: 'ring-[#D4A373]' },
        };

        const DEFAULT_SUBJECTS = ['경제', '디자인', '개발', '수학', '영어', '기타'];

        const App = () => {
            const [timerMode, setTimerMode] = useState('pomodoro');
            const [pomoPhase, setPomoPhase] = useState('focus');
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [focusDuration, setFocusDuration] = useState(25);
            const [breakDuration, setBreakDuration] = useState(5);

            const [elapsed, setElapsed] = useState(0);
            const [isActive, setIsActive] = useState(false);
            const [themeId, setThemeId] = useState('latte');
            const [showSettings, setShowSettings] = useState(false);

            const [subjects, setSubjects] = useState(DEFAULT_SUBJECTS);
            const [selectedSubject, setSelectedSubject] = useState('');
            const [showSubjectDrop, setShowSubjectDrop] = useState(false);
            const [newSubject, setNewSubject] = useState('');
            const subjectRef = useRef(null);
            const [toast, setToast] = useState(null);

            // ✨ 정밀도 보정용 Ref
            const pomoDeadlineRef = useRef(null);
            const swStartTimeRef = useRef(null);
            const swOffsetRef = useRef(0); // 일시정지 누적 시간 보정

            const theme = THEMES[themeId];

            // 노션 연동 정보
            const WORKER_URL = "https://notion-proxy-worker.loraticon.workers.dev";
            const API_KEY = "여기에_노션_API_키를_입력하세요"; 
            const DB_ID = "35b32cb803f980f2a9d9dcfe9ffbb336";

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

            const saveToNotion = async (mode, durationSeconds) => {
                if (durationSeconds <= 0 || API_KEY.includes("입력하세요")) return;
                const now = new Date();
                const titleText = `[${selectedSubject || '미지정'}] ${String(now.getFullYear()).slice(-2)}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
                
                const requestBody = {
                    parent: { database_id: DB_ID },
                    properties: {
                        "이름": { title: [{ text: { content: titleText } }] },
                        "날짜": { date: { start: now.toISOString() } },
                        "모드": { select: { name: mode === 'pomodoro' ? '뽀모도로' : '일반 타이머' } },
                        "순공시간": { number: Math.floor(durationSeconds / 60) }
                    }
                };

                try {
                    await fetch(`${WORKER_URL}/v1/pages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY, 'x-notion-version': '2022-06-28' },
                        body: JSON.stringify(requestBody)
                    });
                    showToast("노션에 성공적으로 기록되었습니다! ☕");
                } catch (e) { console.error("Notion Save Error:", e); }
            };

            // 🍅 뽀모도로 정밀 타이머 (Deadline 기반)
            useEffect(() => {
                if (timerMode !== 'pomodoro' || !isActive) return;

                pomoDeadlineRef.current = Date.now() + (timeLeft * 1000);

                const interval = setInterval(() => {
                    const remaining = Math.max(0, Math.round((pomoDeadlineRef.current - Date.now()) / 1000));
                    setTimeLeft(remaining);

                    if (remaining === 0) {
                        clearInterval(interval);
                        setIsActive(false);
                        if (pomoPhase === 'focus') {
                            saveToNotion('pomodoro', focusDuration * 60);
                            showToast('집중 완료! 기록되었습니다. 🍅');
                        }
                        const next = pomoPhase === 'focus' ? 'break' : 'focus';
                        setPomoPhase(next);
                        setTimeLeft(next === 'focus' ? focusDuration * 60 : breakDuration * 60);
                    }
                }, 100); // 0.1초마다 체크하여 오차 최소화

                return () => clearInterval(interval);
            }, [isActive, timerMode, pomoPhase]);

            // ⏱ 일반 타이머 정밀도 보정 (StartTime & swOffsetRef 기반)
            useEffect(() => {
                if (timerMode !== 'stopwatch' || !isActive) return;

                swStartTimeRef.current = Date.now();

                const interval = setInterval(() => {
                    const currentElapsed = swOffsetRef.current + Math.floor((Date.now() - swStartTimeRef.current) / 1000);
                    setElapsed(currentElapsed);
                }, 100);

                return () => clearInterval(interval);
            }, [isActive, timerMode]);

            const toggleTimer = () => {
                if (isActive) {
                    // 일시정지 시: 현재까지 흐른 시간을 오프셋에 저장
                    if (timerMode === 'stopwatch') {
                        swOffsetRef.current += Math.floor((Date.now() - swStartTimeRef.current) / 1000);
                    }
                }
                setIsActive(!isActive);
            };

            const stopStopwatch = () => {
                setIsActive(false);
                const totalElapsed = swOffsetRef.current + (isActive ? Math.floor((Date.now() - swStartTimeRef.current) / 1000) : 0);
                if (totalElapsed > 0) {
                    saveToNotion('stopwatch', totalElapsed);
                    showToast(`총 ${Math.floor(totalElapsed/60)}분 기록 완료! 📚`);
                }
                setElapsed(0);
                swOffsetRef.current = 0;
            };

            const switchTimerMode = (m) => {
                if (isActive) return;
                setTimerMode(m);
                setElapsed(0);
                swOffsetRef.current = 0;
                setPomoPhase('focus');
                setTimeLeft(focusDuration * 60);
            };

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            };

            const currentDuration = pomoPhase === 'focus' ? focusDuration * 60 : breakDuration * 60;
            const percentage = timerMode === 'pomodoro' ? timeLeft / currentDuration : 1;

            const getArcPath = (pct) => {
                if (pct <= 0) return "";
                if (pct >= 1) return `M100,0 A100,100 0 1,1 99.9,0 Z`;
                const angle = pct * 360;
                const rad = (angle - 90) * (Math.PI / 180);
                const x = 100 + 100 * Math.cos(rad);
                const y = 100 + 100 * Math.sin(rad);
                return `M100,100 L100,0 A100,100 0 ${angle > 180 ? 1 : 0},1 ${x},${y} Z`;
            };

            return (
                <div className="w-full max-w-[340px] bg-[#FDFBF7] dark:bg-zinc-900 rounded-[2.5rem] shadow-2xl border border-[#EBE8DE] dark:border-zinc-800 transition-colors duration-300 relative">
                    <div className="flex justify-between items-center px-7 pt-6 pb-0">
                        <div className="flex flex-col">
                            <span className="text-xs font-bold tracking-widest text-gray-400 dark:text-gray-500 uppercase flex items-center gap-1.5">
                                {timerMode === 'pomodoro' ? (pomoPhase === 'focus' ? 'FOCUS' : 'BREAK') : 'TIMER'}
                                <span className={`w-2 h-2 rounded-full ${isActive ? theme.bg : 'bg-gray-300'}`}></span>
                            </span>
                            <span className="text-lg font-bold text-gray-800 dark:text-gray-100">{theme.name}</span>
                        </div>
                        <button onClick={() => setShowSettings(!showSettings)} className="p-2 text-gray-400 hover:text-[#A67B5B]"><SettingsIcon /></button>
                    </div>

                    <div className="relative p-7 pt-5 flex flex-col items-center">
                        {showSettings && (
                            <div className="absolute inset-0 bg-[#FDFBF7]/95 dark:bg-zinc-900/95 backdrop-blur-md z-20 p-8 flex flex-col justify-center rounded-[2.5rem]">
                                <h3 className="font-bold mb-5">설정</h3>
                                <div className="space-y-4">
                                    <div className="flex justify-between"><label className="text-sm">집중(분)</label><input type="number" value={focusDuration} onChange={e => setFocusDuration(e.target.value)} className="w-12 bg-transparent border-b text-right" /></div>
                                    <div className="flex justify-between"><label className="text-sm">휴식(분)</label><input type="number" value={breakDuration} onChange={e => setBreakDuration(e.target.value)} className="w-12 bg-transparent border-b text-right" /></div>
                                    <div className="flex justify-between pt-4">
                                        {Object.values(THEMES).map(t => <button key={t.id} onClick={() => setThemeId(t.id)} className={`w-6 h-6 rounded-full ${t.bg} ${themeId === t.id ? 'ring-2 ring-offset-2 ring-black' : ''}`} />)}
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="w-full mt-4 py-2 bg-black text-white rounded-xl text-sm">닫기</button>
                                </div>
                            </div>
                        )}

                        <div className="w-full mb-5 flex bg-[#F4F0EA] dark:bg-zinc-800 rounded-full p-1 relative">
                            <div className="mode-slider absolute top-1 bottom-1 w-[calc(50%-4px)] rounded-full bg-white dark:bg-zinc-700 shadow-sm" style={{ transform: timerMode === 'pomodoro' ? 'translateX(0)' : 'translateX(calc(100% + 8px))' }} />
                            <button onClick={() => switchTimerMode('pomodoro')} className={`relative z-10 flex-1 py-1.5 text-xs font-bold ${timerMode === 'pomodoro' ? 'text-black' : 'text-gray-400'}`}>뽀모도로</button>
                            <button onClick={() => switchTimerMode('stopwatch')} className={`relative z-10 flex-1 py-1.5 text-xs font-bold ${timerMode === 'stopwatch' ? 'text-black' : 'text-gray-400'}`}>타이머</button>
                        </div>

                        <div className="w-full mb-4 relative" ref={subjectRef}>
                            <button onClick={() => !isActive && setShowSubjectDrop(!showSubjectDrop)} className="w-full flex items-center justify-between px-4 py-2.5 rounded-2xl bg-white dark:bg-zinc-800 border dark:border-zinc-700 text-sm">
                                <span className="flex items-center gap-2"><BookIcon />{selectedSubject || '과목 선택'}</span>
                                <ChevronIcon />
                            </button>
                            {showSubjectDrop && (
                                <div className="subject-dropdown">
                                    {subjects.map(s => <div key={s} className="subject-option" onClick={() => {setSelectedSubject(s); setShowSubjectDrop(false);}}>{s}</div>)}
                                </div>
                            )}
                        </div>

                        <div className="relative w-56 h-56 flex items-center justify-center mb-2">
                            <svg viewBox="-20 -20 280 260" className="w-full h-full coffee-cup">
                                <circle cx="100" cy="100" r="90" fill="white" className="dark:fill-zinc-800" />
                                <circle cx="100" cy="100" r="80" fill="#F4F0EA" className="dark:fill-zinc-900" />
                                <g clipPath="url(#coffee-clip)">
                                    <path d={getArcPath(percentage)} fill={theme.hex} />
                                    <path d="M100,135 C100,135 60,105 60,80 C60,50 100,55 100,85 C100,55 140,50 140,80 C140,105 100,135 100,135 Z" fill="white" opacity="0.8" />
                                </g>
                                <clipPath id="coffee-clip"><circle cx="100" cy="100" r="80" /></clipPath>
                            </svg>
                            <div className="absolute font-bold text-4xl tabular-nums">{timerMode === 'pomodoro' ? formatTime(timeLeft) : formatTime(elapsed)}</div>
                        </div>

                        <div className="flex w-full space-x-3 mt-4">
                            <button onClick={toggleTimer} className={`flex-1 py-3.5 rounded-2xl font-bold text-sm text-white ${theme.bg} ${theme.hover}`}>{isActive ? '일시정지' : '시작'}</button>
                            {timerMode === 'stopwatch' && <button onClick={stopStopwatch} className="px-5 py-3.5 rounded-2xl bg-gray-100 dark:bg-zinc-800"><StopIcon /></button>}
                            {timerMode === 'pomodoro' && <button onClick={() => {setIsActive(false); setTimeLeft(focusDuration*60);}} className="px-5 py-3.5 rounded-2xl bg-gray-100 dark:bg-zinc-800"><SkipIcon /></button>}
                        </div>
                    </div>
                    {toast && <div className="toast absolute bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-black text-white text-xs z-50">{toast}</div>}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
