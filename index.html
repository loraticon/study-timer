<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코지 카페 타이머</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', '"Helvetica Neue"', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        .coffee-cup { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.05)); }
        .dark .coffee-cup { filter: drop-shadow(0 10px 15px rgba(0,0,0,0.3)); }

        /* 탭 슬라이더 */
        .mode-tab { transition: color 0.2s; }
        .mode-slider { transition: transform 0.25s cubic-bezier(.4,0,.2,1); }

        /* 과목 드롭다운 */
        .subject-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0; right: 0;
            background: #FDFBF7;
            border: 1px solid #EBE8DE;
            border-radius: 1rem;
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            z-index: 50;
            overflow: hidden;
        }
        .dark .subject-dropdown {
            background: #27272a;
            border-color: #3f3f46;
        }
        .subject-option {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: background 0.15s;
        }
        .subject-option:hover { background: #F4F0EA; }
        .dark .subject-option:hover { background: #3f3f46; }

        /* 완료 토스트 */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast { animation: slideUp 0.3s ease; }

        /* 입력 필드 포커스 */
        .subject-input:focus { outline: none; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full flex justify-center items-center p-4"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PlayIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const PauseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>;
        const SkipIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>;
        const SettingsIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const CloseIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
        const ChevronIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
        const BookIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const StopIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>;

        const THEMES = {
            latte:    { id: 'latte',    name: '카페 라떼',  bg: 'bg-[#A67B5B]', hover: 'hover:bg-[#8B664B]', hex: '#A67B5B', ring: 'ring-[#A67B5B]' },
            matcha:   { id: 'matcha',   name: '말차 라떼',  bg: 'bg-[#849F71]', hover: 'hover:bg-[#738C62]', hex: '#849F71', ring: 'ring-[#849F71]' },
            choco:    { id: 'choco',    name: '초코 라떼',  bg: 'bg-[#5C3A21]', hover: 'hover:bg-[#4A2E1A]', hex: '#5C3A21', ring: 'ring-[#5C3A21]' },
            berry:    { id: 'berry',    name: '딸기 라떼',  bg: 'bg-[#D98891]', hover: 'hover:bg-[#C2737D]', hex: '#D98891', ring: 'ring-[#D98891]' },
            earlgrey: { id: 'earlgrey', name: '밀크티',     bg: 'bg-[#D4A373]', hover: 'hover:bg-[#B88B5E]', hex: '#D4A373', ring: 'ring-[#D4A373]' },
        };

        const DEFAULT_SUBJECTS = ['수학', '영어', '국어', '과학', '사회', '기타'];

        const App = () => {
            // 타이머 모드: 'pomodoro' | 'stopwatch'
            const [timerMode, setTimerMode] = useState('pomodoro');

            // 뽀모도로 관련
            const [pomoPhase, setPomoPhase] = useState('focus'); // 'focus' | 'break'
            const [timeLeft, setTimeLeft] = useState(25 * 60);
            const [focusDuration, setFocusDuration] = useState(25);
            const [breakDuration, setBreakDuration] = useState(5);

            // 스톱워치 관련
            const [elapsed, setElapsed] = useState(0); // seconds
            const [startTime, setStartTime] = useState(null); // Date ISO string

            // 공통
            const [isActive, setIsActive] = useState(false);
            const [themeId, setThemeId] = useState('latte');
            const [showSettings, setShowSettings] = useState(false);

            // 과목
            const [subjects, setSubjects] = useState(DEFAULT_SUBJECTS);
            const [selectedSubject, setSelectedSubject] = useState('');
            const [showSubjectDrop, setShowSubjectDrop] = useState(false);
            const [newSubject, setNewSubject] = useState('');
            const subjectRef = useRef(null);

            // 완료 토스트
            const [toast, setToast] = useState(null);

            const theme = THEMES[themeId];

            // 뽀모도로 타이머
            useEffect(() => {
                if (timerMode !== 'pomodoro') return;
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (isActive && timeLeft === 0) {
                    const next = pomoPhase === 'focus' ? 'break' : 'focus';
                    setPomoPhase(next);
                    setTimeLeft(next === 'focus' ? focusDuration * 60 : breakDuration * 60);
                    setIsActive(false);
                    if (next === 'break') showToast('집중 세션 완료! ☕');
                }
                return () => clearInterval(interval);
            }, [isActive, timeLeft, pomoPhase, focusDuration, breakDuration, timerMode]);

            // 스톱워치 타이머
            useEffect(() => {
                if (timerMode !== 'stopwatch') return;
                let interval = null;
                if (isActive) {
                    interval = setInterval(() => setElapsed(e => e + 1), 1000);
                }
                return () => clearInterval(interval);
            }, [isActive, timerMode]);

            // 설정(시간) 변경 시에만 뽀모도로 리셋 — 일시정지 중엔 건드리지 않음
            useEffect(() => {
                if (!isActive && timerMode === 'pomodoro') {
                    setTimeLeft(focusDuration * 60);
                    setPomoPhase('focus');
                }
            }, [focusDuration, breakDuration]); // eslint-disable-line

            // 드롭다운 외부 클릭 닫기
            useEffect(() => {
                const handler = (e) => {
                    if (subjectRef.current && !subjectRef.current.contains(e.target)) {
                        setShowSubjectDrop(false);
                    }
                };
                document.addEventListener('mousedown', handler);
                return () => document.removeEventListener('mousedown', handler);
            }, []);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const formatTime = (seconds) => {
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
            };

            // 스톱워치 종료 (기록)
            const stopStopwatch = () => {
                setIsActive(false);
                if (elapsed > 0) {
                    showToast(`${formatTime(elapsed)} 기록 완료! 📚`);
                }
                // TODO: 노션 DB 저장 → elapsed(초), selectedSubject, startTime
                setElapsed(0);
                setStartTime(null);
            };

            const toggleTimer = () => {
                if (timerMode === 'stopwatch' && !isActive && elapsed === 0) {
                    setStartTime(new Date().toISOString());
                }
                setIsActive(a => !a);
            };

            const switchTimerMode = (m) => {
                if (isActive) return; // 진행 중엔 전환 불가
                setTimerMode(m);
                setElapsed(0);
                setStartTime(null);
                setPomoPhase('focus');
                setTimeLeft(focusDuration * 60);
            };

            const skipPomo = () => {
                const next = pomoPhase === 'focus' ? 'break' : 'focus';
                setPomoPhase(next);
                setTimeLeft(next === 'focus' ? focusDuration * 60 : breakDuration * 60);
                setIsActive(false);
            };

            const addSubject = () => {
                const s = newSubject.trim();
                if (s && !subjects.includes(s)) {
                    setSubjects(prev => [...prev, s]);
                    setSelectedSubject(s);
                }
                setNewSubject('');
                setShowSubjectDrop(false);
            };

            // 원형 퍼센트 (뽀모도로)
            const currentDuration = pomoPhase === 'focus' ? focusDuration * 60 : breakDuration * 60;
            const percentage = timerMode === 'pomodoro' ? timeLeft / currentDuration : 1;

            const getArcPath = (pct) => {
                if (pct <= 0) return "";
                if (pct >= 1) return `M100,0 A100,100 0 1,1 99.9,0 Z`;
                const angle = pct * 360;
                const rad = (angle - 90) * (Math.PI / 180);
                const x = 100 + 100 * Math.cos(rad);
                const y = 100 + 100 * Math.sin(rad);
                const largeArcFlag = angle > 180 ? 1 : 0;
                return `M100,100 L100,0 A100,100 0 ${largeArcFlag},1 ${x},${y} Z`;
            };

            const displayTime = timerMode === 'pomodoro' ? formatTime(timeLeft) : formatTime(elapsed);
            const phase = timerMode === 'pomodoro' ? pomoPhase : 'focus';

            return (
                <div className="w-full max-w-[340px] bg-[#FDFBF7] dark:bg-zinc-900 rounded-[2.5rem] shadow-2xl border border-[#EBE8DE] dark:border-zinc-800 transition-colors duration-300 relative">

                    {/* Header */}
                    <div className="flex justify-between items-center px-7 pt-6 pb-0">
                        <div className="flex flex-col">
                            <span className="text-xs font-bold tracking-widest text-gray-400 dark:text-gray-500 uppercase flex items-center gap-1.5">
                                {timerMode === 'pomodoro'
                                    ? (phase === 'focus' ? 'FOCUS TIME' : 'BREAK TIME')
                                    : 'STUDY TIMER'}
                                <span className={`w-2 h-2 rounded-full ${isActive ? theme.bg : 'bg-gray-300 dark:bg-zinc-600'}`}
                                    style={isActive ? {boxShadow: `0 0 0 3px ${theme.hex}33`} : {}}></span>
                            </span>
                            <span className="text-lg font-bold text-gray-800 dark:text-gray-100 mt-0.5">{theme.name}</span>
                        </div>
                        <button
                            onClick={() => setShowSettings(!showSettings)}
                            className="p-2 -mr-2 text-gray-400 hover:text-[#A67B5B] dark:hover:text-gray-300 transition-colors"
                        >
                            {showSettings ? <CloseIcon /> : <SettingsIcon />}
                        </button>
                    </div>

                    <div className="relative p-7 pt-5 flex flex-col items-center">

                        {/* Settings Panel */}
                        {showSettings && (
                            <div className="absolute inset-0 bg-[#FDFBF7]/95 dark:bg-zinc-900/95 backdrop-blur-md z-20 p-8 flex flex-col justify-center rounded-[2.5rem]">
                                <h3 className="text-lg font-bold mb-5 text-gray-800 dark:text-gray-200">음료 설정 (타이머)</h3>
                                <div className="space-y-5">
                                    <div className="flex justify-between items-center">
                                        <label className="text-sm font-medium text-gray-600 dark:text-gray-400">집중 시간 (분)</label>
                                        <input
                                            type="number"
                                            value={focusDuration}
                                            onChange={(e) => setFocusDuration(Math.max(1, parseInt(e.target.value) || 25))}
                                            className="w-16 text-center border-b-2 border-gray-300 dark:border-zinc-600 bg-transparent text-gray-800 dark:text-gray-200 font-bold p-1 focus:outline-none focus:border-[#A67B5B]"
                                            min="1"
                                        />
                                    </div>
                                    <div className="flex justify-between items-center">
                                        <label className="text-sm font-medium text-gray-600 dark:text-gray-400">휴식 시간 (분)</label>
                                        <input
                                            type="number"
                                            value={breakDuration}
                                            onChange={(e) => setBreakDuration(Math.max(1, parseInt(e.target.value) || 5))}
                                            className="w-16 text-center border-b-2 border-gray-300 dark:border-zinc-600 bg-transparent text-gray-800 dark:text-gray-200 font-bold p-1 focus:outline-none focus:border-[#A67B5B]"
                                            min="1"
                                        />
                                    </div>

                                    {/* 과목 관리 */}
                                    <div className="pt-4 border-t border-[#EBE8DE] dark:border-zinc-800">
                                        <label className="text-sm font-medium text-gray-600 dark:text-gray-400 block mb-3">과목 관리</label>
                                        <div className="flex flex-wrap gap-2 mb-3">
                                            {subjects.map(s => (
                                                <span key={s} className="flex items-center gap-1 px-2.5 py-1 rounded-full bg-[#F4F0EA] dark:bg-zinc-800 text-xs text-gray-600 dark:text-gray-400">
                                                    {s}
                                                    {!DEFAULT_SUBJECTS.includes(s) && (
                                                        <button onClick={() => setSubjects(prev => prev.filter(x => x !== s))} className="text-gray-400 hover:text-red-400 transition-colors ml-0.5">×</button>
                                                    )}
                                                </span>
                                            ))}
                                        </div>
                                        <div className="flex gap-2">
                                            <input
                                                value={newSubject}
                                                onChange={e => setNewSubject(e.target.value)}
                                                onKeyDown={e => e.key === 'Enter' && addSubject()}
                                                placeholder="과목 추가..."
                                                className="flex-1 text-sm border-b-2 border-gray-300 dark:border-zinc-600 bg-transparent text-gray-800 dark:text-gray-200 p-1 focus:outline-none focus:border-[#A67B5B] placeholder-gray-300 dark:placeholder-zinc-600"
                                            />
                                            <button onClick={addSubject} className={`text-xs px-3 py-1 rounded-full text-white ${theme.bg} ${theme.hover} transition-colors`}>추가</button>
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-[#EBE8DE] dark:border-zinc-800">
                                        <label className="text-sm font-medium text-gray-600 dark:text-gray-400 block mb-3">메뉴 선택 (테마 색상)</label>
                                        <div className="flex justify-between">
                                            {Object.values(THEMES).map((t) => (
                                                <button
                                                    key={t.id}
                                                    onClick={() => setThemeId(t.id)}
                                                    className={`w-9 h-9 rounded-full ${t.bg} shadow-sm transition-all duration-200 focus:outline-none ${themeId === t.id ? `ring-2 ring-offset-2 ring-offset-[#FDFBF7] dark:ring-offset-zinc-900 ${t.ring} scale-110` : 'hover:scale-110'}`}
                                                    title={t.name}
                                                />
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 타이머 모드 탭 */}
                        <div className="w-full mb-5">
                            <div className="relative flex bg-[#F4F0EA] dark:bg-zinc-800 rounded-full p-1">
                                <div
                                    className={`mode-slider absolute top-1 bottom-1 w-[calc(50%-4px)] rounded-full bg-white dark:bg-zinc-700 shadow-sm`}
                                    style={{ transform: timerMode === 'pomodoro' ? 'translateX(0)' : 'translateX(calc(100% + 8px))' }}
                                />
                                <button
                                    onClick={() => switchTimerMode('pomodoro')}
                                    className={`mode-tab relative z-10 flex-1 text-xs font-bold py-1.5 rounded-full transition-colors ${timerMode === 'pomodoro' ? 'text-gray-800 dark:text-gray-100' : 'text-gray-400 dark:text-gray-500'} ${isActive ? 'cursor-not-allowed opacity-50' : ''}`}
                                >
                                    🍅 뽀모도로
                                </button>
                                <button
                                    onClick={() => switchTimerMode('stopwatch')}
                                    className={`mode-tab relative z-10 flex-1 text-xs font-bold py-1.5 rounded-full transition-colors ${timerMode === 'stopwatch' ? 'text-gray-800 dark:text-gray-100' : 'text-gray-400 dark:text-gray-500'} ${isActive ? 'cursor-not-allowed opacity-50' : ''}`}
                                >
                                    ⏱ 일반 타이머
                                </button>
                            </div>
                        </div>

                        {/* 과목 선택 드롭다운 */}
                        <div className="w-full mb-4 relative" ref={subjectRef}>
                            <button
                                onClick={() => !isActive && setShowSubjectDrop(v => !v)}
                                className={`w-full flex items-center justify-between px-4 py-2.5 rounded-2xl border transition-all duration-200
                                    ${selectedSubject
                                        ? `border-transparent bg-[${theme.hex}18]`
                                        : 'border-[#EBE8DE] dark:border-zinc-700 bg-white dark:bg-zinc-800'}
                                    ${isActive ? 'opacity-60 cursor-not-allowed' : 'hover:border-[#D1CBBF] dark:hover:border-zinc-600 cursor-pointer'}`}
                                style={selectedSubject ? {background: `${theme.hex}15`, borderColor: `${theme.hex}40`} : {}}
                            >
                                <span className="flex items-center gap-2 text-sm font-medium text-gray-700 dark:text-gray-300">
                                    <BookIcon />
                                    {selectedSubject || <span className="text-gray-400 dark:text-gray-500">과목 선택</span>}
                                </span>
                                <span className={`text-gray-400 transition-transform duration-200 ${showSubjectDrop ? 'rotate-180' : ''}`}>
                                    <ChevronIcon />
                                </span>
                            </button>

                            {showSubjectDrop && !isActive && (
                                <div className="subject-dropdown">
                                    <div
                                        className="subject-option text-gray-400 dark:text-gray-500"
                                        onClick={() => { setSelectedSubject(''); setShowSubjectDrop(false); }}
                                    >
                                        선택 안 함
                                    </div>
                                    {subjects.map(s => (
                                        <div
                                            key={s}
                                            className={`subject-option font-medium ${selectedSubject === s ? 'text-gray-800 dark:text-gray-100' : 'text-gray-600 dark:text-gray-400'}`}
                                            style={selectedSubject === s ? {background: `${theme.hex}18`} : {}}
                                            onClick={() => { setSelectedSubject(s); setShowSubjectDrop(false); }}
                                        >
                                            {selectedSubject === s && <span className="mr-1.5" style={{color: theme.hex}}>✓</span>}
                                            {s}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Coffee Cup */}
                        <div className="relative w-56 h-56 flex items-center justify-center mb-1">
                            <svg viewBox="-20 -20 280 260" className="w-full h-full coffee-cup overflow-visible">
                                <defs>
                                    <filter id="cup-shadow" x="-100%" y="-100%" width="300%" height="300%">
                                        <feDropShadow dx="2" dy="8" stdDeviation="5" floodOpacity="0.08" />
                                    </filter>
                                    <clipPath id="coffee-clip">
                                        <path d={getArcPath(percentage)} />
                                    </clipPath>
                                </defs>
                                <path d="M 170 65 C 225 65, 225 135, 170 135" fill="none" stroke="#FFFFFF" strokeWidth="18" strokeLinecap="round" className="dark:stroke-zinc-800 transition-colors duration-300" filter="url(#cup-shadow)" />
                                <circle cx="100" cy="100" r="90" fill="#FFFFFF" className="dark:fill-zinc-800 transition-colors duration-300" filter="url(#cup-shadow)" />
                                <circle cx="100" cy="100" r="80" fill="#F4F0EA" className="dark:fill-zinc-900 transition-colors duration-300" />
                                <text x="100" y="96" textAnchor="middle" dominantBaseline="middle" fontSize="11" className="fill-[#D1CBBF] dark:fill-zinc-700" fontWeight="bold">
                                    {timerMode === 'pomodoro'
                                        ? (phase === 'focus' ? 'Good Job!' : 'Take a rest')
                                        : (elapsed === 0 ? 'Ready!' : 'Fighting!')}
                                </text>
                                <g clipPath="url(#coffee-clip)">
                                    <circle cx="100" cy="100" r="80" fill={theme.hex} className="transition-colors duration-500" />
                                    <circle cx="100" cy="100" r="76" fill="none" stroke="#FFFFFF" strokeWidth="3" opacity="0.15" />
                                    <path d="M100,135 C100,135 60,105 60,80 C60,50 100,55 100,85 C100,55 140,50 140,80 C140,105 100,135 100,135 Z" fill="#FFF9ED" opacity="0.85" />
                                </g>
                                <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(0,0,0,0.06)" strokeWidth="6" />
                            </svg>
                        </div>

                        {/* 시간 표시 */}
                        <div className="font-sans text-[2.5rem] leading-none font-bold tracking-tight text-gray-800 dark:text-gray-100 mb-1 tabular-nums">
                            {displayTime}
                        </div>

                        <div className="mb-4" />

                        {/* Controls */}
                        <div className="flex w-full space-x-3">
                            <button
                                onClick={toggleTimer}
                                className={`flex-1 flex items-center justify-center space-x-2 py-3.5 rounded-[1.25rem] font-bold text-sm transition-all duration-200 shadow-sm
                                    ${isActive
                                        ? 'bg-white dark:bg-zinc-800 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-zinc-700 hover:bg-gray-50 dark:hover:bg-zinc-700'
                                        : `${theme.bg} text-white ${theme.hover} shadow-md`
                                    }`}
                            >
                                {isActive ? (
                                    <><PauseIcon /><span>{timerMode === 'pomodoro' ? (phase === 'focus' ? '잠깐 쉬기' : '잠깐 멈추기') : '잠깐 쉬기'}</span></>
                                ) : (
                                    <><PlayIcon /><span>
                                        {timerMode === 'pomodoro'
                                            ? (timeLeft === currentDuration
                                                ? (phase === 'focus' ? '집중 시작' : '휴식 시작')
                                                : '계속하기')
                                            : (elapsed === 0 ? '공부 시작' : '계속하기')}
                                    </span></>
                                )}
                            </button>

                            {/* 뽀모도로: 스킵 / 스톱워치: 종료(기록) */}
                            {timerMode === 'pomodoro' ? (
                                <button
                                    onClick={skipPomo}
                                    className="px-5 py-3.5 flex items-center justify-center rounded-[1.25rem] bg-white dark:bg-zinc-800 text-gray-500 hover:text-[#A67B5B] border border-gray-200 dark:border-zinc-700 dark:text-gray-400 dark:hover:text-[#D4A373] dark:hover:bg-zinc-700 transition-colors duration-200 shadow-sm"
                                    title="건너뛰기"
                                >
                                    <SkipIcon />
                                </button>
                            ) : (
                                <button
                                    onClick={stopStopwatch}
                                    disabled={elapsed === 0}
                                    className={`px-5 py-3.5 flex items-center justify-center rounded-[1.25rem] border transition-colors duration-200 shadow-sm
                                        ${elapsed > 0
                                            ? 'bg-white dark:bg-zinc-800 text-gray-500 hover:text-red-400 border-gray-200 dark:border-zinc-700 dark:text-gray-400 dark:hover:bg-zinc-700'
                                            : 'bg-gray-50 dark:bg-zinc-800 text-gray-300 dark:text-zinc-600 border-gray-100 dark:border-zinc-700 cursor-not-allowed'}`}
                                    title="종료 및 기록"
                                >
                                    <StopIcon />
                                </button>
                            )}
                        </div>

                        {/* 뽀모도로 모드일 때 안내 */}
                        {timerMode === 'pomodoro' && (
                            <p className="text-xs text-gray-400 dark:text-gray-600 mt-3 text-center">
                                뽀모도로 종료 시 총 집중 시간이 기록됩니다
                            </p>
                        )}

                    </div>

                    {/* Toast */}
                    {toast && (
                        <div className="toast absolute bottom-6 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full bg-gray-800 dark:bg-zinc-700 text-white text-xs font-medium shadow-lg whitespace-nowrap z-50">
                            {toast}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
