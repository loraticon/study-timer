    .drawer-backdrop.open { opacity:1; pointer-events:auto; }
    .drawer { position:fixed; bottom:0; left:0; right:0; z-index:50; border-radius:1.5rem 1.5rem 0 0; background:#FDFBF7; box-shadow:none; transform:translateY(100%); transition:transform .32s cubic-bezier(.32,1,.46,1), box-shadow .2s ease; max-height:70vh; display:flex; flex-direction:column; }
    .drawer.open { transform:translateY(0); box-shadow:0 -6px 32px rgba(92,58,33,.13); }

    .icon-svg { width:1rem; height:1rem; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

    .tab-btn { flex:1; padding:.45rem 0; font-size:.7rem; font-weight:700; border-radius:9999px; transition:all .18s; color:#B5A898; }

    .dark .tab-btn { color:#8B949E; }
    .dark .tab-btn.active { background:#252525; color:#D4A373; }

    .item-thumb img { width:100%; height:100%; object-fit:contain; display:block; }
    .item-fallback { font-size:1.45rem; line-height:1; }
    .item-label { width:100%; font-size:.55rem; font-weight:800; color:#8B664B; margin-top:.16rem; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .item-btn.selected { border-color:#A67B5B; background:#F4F0EA; }
    .item-btn.locked { opacity:.45; cursor:not-allowed; }

    .dark .item-btn.selected { border-color:#A67B5B; background:#2F2F2F; }
    .dark .item-btn .lock-icon { background:rgba(25,25,25,.88); color:#D4A373; box-shadow:none; }
    .dark .item-label { color:#D4A373; }
    .dark input::placeholder { color:#737373; }

    .dark .quest-row { background:#252525; }

    @keyframes sodaBubbleRise {

      72%{opacity:.85}

    .soda-bubbles { animation:coffeeDrinkSway 5.6s ease-in-out infinite; transform-origin:center 44%; }
    .soda-bubble { animation:sodaBubbleRise 2.4s ease-in-out infinite, sodaBubbleTwinkle 1.2s ease-in-out infinite; transform-origin:center; }

    .soda-bubble:nth-child(3) { animation-delay:.9s,.3s; }

const normalizeDeco = (saved) => {
  const next = { ...DEFAULT_DECO, ...(saved || {}) };
  if (next.cupDeco === 'deco_gingercat') next.cupDeco = 'deco_left_gingercat';
  if (next.cupDeco2 === 'deco_gingercat' || next.cupDeco2 === 'deco_left_gingercat') next.cupDeco2 = 'deco_none';

];
const MAX_DECO_PRESETS = 12;
const ymdLocal = (date) => {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
};
const makeMonthlyRanges = (periodMonths) => {
  if (periodMonths === 'all') return null;
  const n = Math.max(1, parseInt(periodMonths, 10) || 12);
  const tomorrow = new Date();
  tomorrow.setHours(0,0,0,0);
  tomorrow.setDate(tomorrow.getDate()+1);
  const start = new Date(tomorrow.getFullYear(), tomorrow.getMonth() - (n - 1), 1);
  const ranges = [];
  let cursor = new Date(start);
  while (cursor < tomorrow) {
    const next = new Date(cursor.getFullYear(), cursor.getMonth()+1, 1);
    const rangeEnd = next < tomorrow ? next : tomorrow;
    ranges.push({ start: ymdLocal(cursor), end: ymdLocal(rangeEnd) });
    cursor = next;
  }
  return ranges.reverse();
};

  const params = new URLSearchParams(window.location.search);

  const recordDbId = cleanUrlValue(params.get('recordDbId'));

  if (proxyUrl && apiKey && recordDbId) {
    return { proxyUrl, apiKey, recordDbId, questDbId, saved:true, fromUrl:true };
  }
  return null;
};

const toDate = (iso) => iso ? iso.slice(0,10) : null;
const today  = () => new Date().toISOString().slice(0,10);

function computeStats(records) {
  const todayStr = today();
  // 날짜별 분 집계
  const dayMap = {};
  let totalMinutes = 0;
  let pomoCount = 0;
  let coffeeCount = 0;
  const coffeeSet = new Set();

  for (const r of records) {
    const d = toDate(r.date);
    if (!d) continue;
    const m = r.minutes || 0;
    dayMap[d] = (dayMap[d] || 0) + m;
    totalMinutes += m;
    if (r.mode === '뽀모도로') pomoCount++;
    if (r.coffee) { coffeeCount++; coffeeSet.add(r.coffee); }
  }

  const todayMinutes = dayMap[todayStr] || 0;
  const attendDays   = Object.keys(dayMap).length;

  // 연속 공부
  let streak = 0;
  const d = new Date(todayStr);
  while (true) {
    const k = d.toISOString().slice(0,10);
    if (!dayMap[k]) break;
    streak++;
    d.setDate(d.getDate()-1);
  }

  // 2시간 이상인 날 카운트
  const days120Count = Object.values(dayMap).filter(m=>m>=120).length;

  // 출석 관련
  const now = new Date(todayStr);
  const dow = now.getDay(); // 0=일

  // 이번 주 월~금
  let weekdayFull = true;
  for (let i=1;i<=5;i++) {
    const dd = new Date(now); dd.setDate(now.getDate() - ((dow-i+7)%7));
    if (dd > now) { weekdayFull=false; break; }
    if (!dayMap[dd.toISOString().slice(0,10)]) { weekdayFull=false; break; }
  }
  // 이번 주 월~일
  let weekFull = true;
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-((dow+6)%7));
  for (let i=0;i<7;i++) {
    const dd = new Date(weekStart); dd.setDate(weekStart.getDate()+i);
    if (dd > now) break;
    if (!dayMap[dd.toISOString().slice(0,10)]) { weekFull=false; break; }
  }
  // 이번 달 개근
  let monthFull = true;
  const y=now.getFullYear(), mo=now.getMonth();
  for (let i=1;i<=now.getDate();i++) {
    const dd = new Date(y,mo,i).toISOString().slice(0,10);
    if (!dayMap[dd]) { monthFull=false; break; }
  }

  return { todayMinutes, totalMinutes, pomoCount, coffeeCount,
    coffeeTypes: coffeeSet.size, streak, attendDays, days120Count,
    weekdayFull, weekFull, monthFull };
}

function App() {

  const [clockOn, setClockOn] = useState(() => loadLS(LS.CLOCK_ON, true));
  const [uiOn,    setUiOn]    = useState(() => loadLS(LS.UI_ON, true));
  const [darkMode,setDarkMode]= useState(() => loadLS(LS.DARK_MODE, false));
  const [widgetBorder, setWidgetBorder] = useState(() => loadLS(LS.WIDGET_BORDER, true));
  const [time,    setTime]    = useState('');

  const [drawer,    setDrawer]    = useState(null); // null | 'deco' | 'quest'
  const [decoTab,   setDecoTab]   = useState('cat');
  const [deco, setDeco] = useState(() => normalizeDeco(loadLS(LS.DECO, DEFAULT_DECO)));
  const [recordMonths, setRecordMonths] = useState(() => loadLS(LS.RECORD_MONTHS, '12'));
  const [decoPresets, setDecoPresets] = useState(() => loadLS(LS.PRESETS, []));
  const [presetName, setPresetName] = useState('');

  const [toast,    setToast]    = useState('');
  const [toastKey, setToastKey] = useState(0);
  const [questCat, setQuestCat] = useState('전체');
  const [coffeePop, setCoffeePop] = useState(false);
  const toastTimer = useRef(null);
  const coffeePopTimer = useRef(null);

  // ── 시계 ──
  useEffect(() => {
    const tick = () => {
      const n = new Date();
      setTime(`${String(n.getHours()).padStart(2,'0')} : ${String(n.getMinutes()).padStart(2,'0')}`);
    };
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, []);

  // ── 토스트 ──
  const showToast = useCallback((msg) => {
    setToast(msg); setToastKey(k=>k+1);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(''), 2800);
  }, []);

  const triggerCoffeePop = useCallback(() => {
    setCoffeePop(false);
    if (coffeePopTimer.current) clearTimeout(coffeePopTimer.current);
    requestAnimationFrame(() => {
      setCoffeePop(true);
      coffeePopTimer.current = setTimeout(() => setCoffeePop(false), 520);
    });
  }, []);

  // ── 저장 ──
  useEffect(() => { saveLS(LS.CLOCK_ON, clockOn); }, [clockOn]);
  useEffect(() => { saveLS(LS.UI_ON, uiOn); }, [uiOn]);
  useEffect(() => { saveLS(LS.DARK_MODE, darkMode); }, [darkMode]);
  useEffect(() => { saveLS(LS.WIDGET_BORDER, widgetBorder); }, [widgetBorder]);
  useEffect(() => { saveLS(LS.DECO, deco); }, [deco]);
  useEffect(() => { saveLS(LS.RECORD_MONTHS, recordMonths); }, [recordMonths]);
  useEffect(() => { saveLS(LS.PRESETS, decoPresets); }, [decoPresets]);

  // ── 데이터 로드 ──
  const fetchData = useCallback(async (cfg = config, period = recordMonths) => {
    if (!cfg) return;
    setLoading(true); setError('');
    try {
      // 공부기록
      // 기록이 많아질 것을 대비해 기본값은 최근 12개월만 월별로 나누어 불러옵니다.
      // 설정 화면에서 3/6/12/24개월 또는 전체로 변경할 수 있습니다.
      let allRecs = [];
      const readRecordPage = async (body) => {
        let cursor = undefined;
        do {
          const pageBody = { ...body, page_size:100 };
          if (cursor) pageBody.start_cursor = cursor;
          const res = await fetch(`${cfg.proxyUrl}/v1/databases/${cfg.recordDbId}/query`, {
            method:'POST',
            headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'x-notion-version':'2022-06-28'},
            body: JSON.stringify(pageBody)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || '공부기록 로드 실패');
          for (const p of data.results) {
            allRecs.push({
              date:    p.properties['날짜']?.date?.start || p.created_time,
              minutes: p.properties['순공시간']?.number || 0,
              mode:    p.properties['모드']?.select?.name || '',
              coffee:  p.properties['커피 종류']?.select?.name || '',
            });
          }
          cursor = data.has_more ? data.next_cursor : null;
        } while (cursor);
      };

      const ranges = makeMonthlyRanges(period);
      if (ranges) {
        for (const r of ranges) {
          await readRecordPage({
            sorts:[{property:'날짜',direction:'descending'}],
            filter:{ property:'날짜', date:{ on_or_after:r.start, before:r.end } }
          });
        }
      } else {
        await readRecordPage({ sorts:[{property:'날짜',direction:'descending'}] });
      }
      setRecords(allRecs);

      // 퀘스트 달성 날짜
      if (cfg.questDbId) {
        const qRes = await fetch(`${cfg.proxyUrl}/v1/databases/${cfg.questDbId}/query`, {
          method:'POST',
          headers:{'Content-Type':'application/json','x-api-key':cfg.apiKey,'x-notion-version':'2022-06-28'},
          body: JSON.stringify({ page_size:100 })
        });
        const qData = await qRes.json();
        if (qRes.ok) {
          const done = {};
          for (const p of qData.results) {
            const qid  = p.properties['퀘스트ID']?.title?.[0]?.plain_text || '';
            const date = p.properties['날짜']?.date?.start || '';
            if (qid && date) done[qid] = date;
          }

  useEffect(() => { if (config && !showSetup) fetchData(); }, [config, showSetup]);

    if (!records.length) return [];
    return QUESTS.filter(q => !questDone[q.id] && q.check(stats));

  // ── 설정 저장 ──
  const handleSaveSetup = async () => {

    if (!proxyUrl || !apiKey || !recordDbId) { setError('Proxy URL, API Key, 공부기록 DB ID는 필수입니다.'); return; }

  const dark    = darkMode || bgColor === '#2D2420';

  // 잠금 해제 여부
  const isUnlocked = (item) => !item.unlock || !!questDone[item.unlock];
  const getDecoItems = (key) => DECO_ITEMS[key];

    showToast(`프리셋 '${name}' 저장 완료`);
  }, [presetName, deco, decoPresets.length, showToast]);

  const applyDecoPreset = useCallback((preset) => {
    const next = {...DEFAULT_DECO};
    let skipped = 0;
    Object.entries(preset.deco || {}).forEach(([key, value]) => {
      const item = getDecoItems(key)?.find(i => i.id === value);
      if (!item) return;
      if (isUnlocked(item)) next[key] = value;
      else skipped += 1;
    });
    setDeco(next);
    showToast(skipped ? `프리셋 적용 완료 · 잠긴 아이템 ${skipped}개 제외` : `프리셋 '${preset.name}' 적용 완료`);

    if (!config?.questDbId) return questPageIds.current;

      const res = await fetch(`${config.proxyUrl}/v1/databases/${config.questDbId}/query`, {
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':config.apiKey,'x-notion-version':'2022-06-28'},
        body: JSON.stringify({ page_size:100 })

      const data = await res.json();
      if (!res.ok) return questPageIds.current;
      for (const p of data.results) {
        const qid = p.properties['퀘스트ID']?.title?.[0]?.plain_text || '';

      }
      return questPageIds.current;
    } catch{

    }

        headers:{'Content-Type':'application/json','x-api-key':config.apiKey,'x-notion-version':'2022-06-28'},

          ) : (
            <button onClick={()=>setClockOn(true)} title="시계 켜기"
              style={{fontSize:'.7rem',color:subCol,background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',fontWeight:600,opacity:.6}}>
              시계 표시
            </button>
          )}
        </div>
        )}

        {/* 하단 탭 */}
        {uiOn && (
        <div className="widget-content" style={{padding:'.3rem .75rem .9rem'}}>
          {/* 로딩 인디케이터 */}
          {loading && <div style={{textAlign:'center',fontSize:'.62rem',color:subCol,marginBottom:'.3rem',opacity:.7}}>⏳ 데이터 불러오는 중…</div>}
          {error   && <div style={{textAlign:'center',fontSize:'.62rem',color:'#E07A5F',marginBottom:'.3rem'}}>{error}</div>}


          <div style={{display:'flex',gap:'.4rem'}}>
            <button className={`tab-btn${drawer==='deco'?' active':''}`}
              onClick={()=>setDrawer(d=>d==='deco'?null:'deco')}
              style={{color: drawer==='deco' ? drawerUi.accentStrong : drawerUi.muted}}>
              꾸미기
            </button>
            <button className={`tab-btn${drawer==='quest'?' active':''}`}
              onClick={()=>setDrawer(d=>d==='quest'?null:'quest')}
              style={{color: drawer==='quest' ? drawerUi.accentStrong : drawerUi.muted}}>
              퀘스트 {claimableQuests.length > 0 && <span style={{background:'#E07A5F',color:'#fff',borderRadius:'9999px',padding:'0 .3rem',fontSize:'.6rem',marginLeft:'.2rem'}}>{claimableQuests.length}</span>}
            </button>
          </div>
        </div>
        )}
      </div>

      {/* ━━━ 드로어: 꾸미기 ━━━ */}
      <div className={`drawer${drawer==='deco'?' open':''}`}>
        <div className="drawer-handle"/>
        <div style={{padding:'0 1rem .5rem',flexShrink:0}}>
          <div style={{fontWeight:800,fontSize:'.82rem',color:drawerUi.title,marginBottom:'.6rem'}}>꾸미기</div>
          {/* 꾸미기 서브탭 */}
          <div style={{display:'flex',gap:'.3rem',overflowX:'auto',paddingBottom:'.3rem'}}>
            {Object.entries(DECO_TAB_LABELS).map(([key,label])=>(
              <button key={key} onClick={()=>setDecoTab(key)}
                style={{
                  flexShrink:0, padding:'.28rem .7rem', borderRadius:'9999px', border:'none', cursor:'pointer',
                  fontSize:'.68rem', fontWeight:700, fontFamily:'inherit',
                  background: decoTab===key ? '#A67B5B' : drawerUi.chipBg,
                  color:       decoTab===key ? '#fff'    : drawerUi.accentStrong,
                  transition:'all .15s',
                }}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div style={{overflowY:'auto',flex:1,padding:'0 1rem 1.5rem'}}>
          {decoTab === 'preset' ? (
            <div>
              <div style={{border:`1px solid ${drawerUi.panelBorder}`,background:drawerUi.panelBg,borderRadius:'1rem',padding:'.75rem',marginBottom:'.75rem'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem',marginBottom:'.5rem'}}>
                  <div>
                    <div style={{fontSize:'.74rem',fontWeight:800,color:drawerUi.title}}>현재 꾸미기 저장</div>
                    <div style={{fontSize:'.6rem',color:drawerUi.muted,marginTop:'.08rem'}}>카드 미리보기로 저장됩니다.</div>
                  </div>
                  <button onClick={saveDecoPreset} style={{border:'none',borderRadius:'9999px',background:'#A67B5B',color:'#fff',fontSize:'.62rem',fontWeight:800,padding:'.38rem .65rem',fontFamily:'inherit',cursor:'pointer',flexShrink:0}}>저장</button>
                </div>
                <input value={presetName} onChange={e=>setPresetName(e.target.value)} placeholder="프리셋 이름 (예: 민트 냥이)" style={{width:'100%',boxSizing:'border-box',border:`1px solid ${drawerUi.panelBorder}`,background:drawerUi.inputBg,borderRadius:'.75rem',padding:'.52rem .65rem',fontSize:'.66rem',fontFamily:'inherit',outline:'none',color:drawerUi.text}} />
              </div>

              {decoPresets.length > 0 ? (
                <div style={{display:'grid',gridTemplateColumns:'repeat(2, minmax(0,1fr))',gap:'.65rem'}}>
                  {decoPresets.map(p => {
                    const pBg = DECO_ITEMS.bg.find(i=>i.id===p.deco?.bg)?.color || '#FDFBF7';
                    const lockedCount = Object.entries(p.deco || {}).filter(([key,value]) => {
                      const item = getDecoItems(key)?.find(i=>i.id===value);
                      return item && !isUnlocked(item);
                    }).length;
                    return (
                      <div key={p.id} style={{border:`1px solid ${drawerUi.panelBorder}`,background:drawerUi.panelAltBg,borderRadius:'1rem',padding:'.55rem',position:'relative',overflow:'hidden'}}>
                        <button onClick={()=>deleteDecoPreset(p.id)} title="프리셋 삭제" style={{position:'absolute',top:'.45rem',right:'.45rem',zIndex:2,border:'none',background:drawerUi.deleteBg,color:drawerUi.accent,borderRadius:'9999px',width:'1.2rem',height:'1.2rem',fontSize:'.7rem',lineHeight:1,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>×</button>
                        <button onClick={()=>applyDecoPreset(p)} title="프리셋 적용" style={{width:'100%',border:'none',background:'transparent',padding:0,cursor:'pointer',fontFamily:'inherit',textAlign:'left'}}>
                          <div style={{height:'6.7rem',borderRadius:'.8rem',background:pBg,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',border:drawerUi.previewBorder}}>
                            <div style={{width:'5.9rem',height:'7.1rem',transform:'translateY(.12rem)'}}>
                              <CupSVG catItem={p.deco?.cat || DEFAULT_DECO.cat} drinkItem={p.deco?.drink || DEFAULT_DECO.drink} catAccItem={p.deco?.catAcc || DEFAULT_DECO.catAcc} cupDecoItem={p.deco?.cupDeco || DEFAULT_DECO.cupDeco} cupDeco2Item={p.deco?.cupDeco2 || DEFAULT_DECO.cupDeco2} bgColor={pBg}/>
                            </div>
                          </div>
                          <div style={{fontSize:'.68rem',fontWeight:900,color:drawerUi.title,marginTop:'.45rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.name}</div>
                          <div style={{fontSize:'.55rem',color:drawerUi.muted,lineHeight:1.45,marginTop:'.15rem'}}>
                            {getDecoLabel('cat', p.deco?.cat)} · {getDecoLabel('drink', p.deco?.drink)}<br/>
                            {getDecoLabel('catAcc', p.deco?.catAcc)} · {getDecoLabel('cupDeco', p.deco?.cupDeco)} · {getDecoLabel('cupDeco2', p.deco?.cupDeco2)}
                          </div>
                          {lockedCount > 0 && <div style={{display:'inline-flex',marginTop:'.35rem',fontSize:'.52rem',fontWeight:800,color:'#E07A5F',background:drawerUi.lockBg,borderRadius:'9999px',padding:'.14rem .38rem'}}>잠김 {lockedCount}개 제외</div>}
                        </button>
                      </div>
                    );
                  })}
                </div>
              ) : (
                <div style={{border:`1px dashed ${drawerUi.panelBorder}`,borderRadius:'1rem',padding:'1rem',textAlign:'center',background:drawerUi.panelBg}}>
                  <div style={{fontSize:'.78rem',fontWeight:800,color:drawerUi.accentStrong,marginBottom:'.25rem'}}>저장된 프리셋이 없어요</div>
                  <div style={{fontSize:'.62rem',color:drawerUi.muted,lineHeight:1.5}}>자주 쓰는 꾸미기 조합을 저장해두면 초기화 후에도 빠르게 다시 적용할 수 있어요.</div>
                </div>
              )}
            </div>
          ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(64px,1fr))',gap:'.55rem'}}>
            {DECO_ITEMS[decoTab]?.map(item => {
              const unlocked = isUnlocked(item);
              const selected = deco[decoTab] === item.id;
              const thumbSrc = getDecoThumbSrc(decoTab, item.id);
              return (
                <button key={item.id}
                  className={`item-btn${selected?' selected':''}${!unlocked?' locked':''}`}
                  title={item.label}
                  onClick={()=>{ if(!unlocked){showToast(`🔒 퀘스트 달성 후 해금됩니다`);return;} setDeco(d=>({...d,[decoTab]:item.id})); }}
                >
                  <div className="item-thumb">
                    {decoTab === 'bg'
                      ? <div style={{width:'100%',height:'100%',borderRadius:'.7rem',background:item.color,border:'2px solid rgba(0,0,0,.08)'}}/>
                      : thumbSrc
                        ? <img src={thumbSrc} alt="" draggable="false" onError={(e)=>{ e.currentTarget.style.display='none'; const fallback=e.currentTarget.nextElementSibling; if(fallback) fallback.style.display='block'; }} />
                        : null
                    }
                    {decoTab !== 'bg' && <span className="item-fallback" style={{display:thumbSrc ? 'none' : 'block'}}>{item.emoji}</span>}
                  </div>
                  <div className="item-label">{item.label}</div>
                  {!unlocked && (
                    <div className="lock-icon" aria-label="잠김" title="잠김">🔒</div>
                  )}
                  {!unlocked && item.unlock && (
                    <div style={{position:'absolute',bottom:'-1.4rem',left:'50%',transform:'translateX(-50%)',fontSize:'.52rem',color:drawerUi.muted,whiteSpace:'nowrap',pointerEvents:'none'}}>
                      {QUESTS.find(q=>q.id===item.unlock)?.name}
                    </div>
                  )}
                </button>
              );
            })}
          </div>
          )}
        </div>
      </div>

      {/* ━━━ 드로어: 퀘스트 ━━━ */}
      <div className={`drawer${drawer==='quest'?' open':''}`}>
        <div className="drawer-handle"/>
        <div style={{padding:'0 1rem .5rem',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.5rem'}}>
            <div style={{fontWeight:800,fontSize:'.82rem',color:drawerUi.title}}>퀘스트</div>
            <div style={{fontSize:'.68rem',color:drawerUi.accent,fontWeight:700}}>{doneCount} / {QUESTS.length} 달성</div>
          </div>
          {/* 진행도 바 */}
          <div style={{height:'.35rem',background:drawerUi.progressBg,borderRadius:'9999px',marginBottom:'.6rem',overflow:'hidden'}}>
            <div style={{height:'100%',width:`${(doneCount/QUESTS.length)*100}%`,background:'linear-gradient(90deg,#E8A87C,#A67B5B)',borderRadius:'9999px',transition:'width .5s ease'}}/>
          </div>
          {/* 카테고리 필터 */}
          <div style={{display:'flex',gap:'.3rem',overflowX:'auto',paddingBottom:'.3rem'}}>
            {questCats.map(cat=>(
              <button key={cat} onClick={()=>setQuestCat(cat)}
                style={{
                  flexShrink:0, padding:'.25rem .65rem', borderRadius:'9999px', border:'none', cursor:'pointer',
                  fontSize:'.65rem', fontWeight:700, fontFamily:'inherit',
                  background: questCat===cat ? (QUEST_CAT_COLOR[cat]||'#A67B5B') : drawerUi.chipBg,
                  color:       questCat===cat ? '#fff' : drawerUi.accentStrong,
                  transition:'all .15s',
                }}>
                {cat}
              </button>
            ))}
          </div>
        </div>

        <div style={{overflowY:'auto',flex:1,padding:'0 1rem 1.5rem'}}>
          {filteredQuests.map(q => {
            const done = !!questDone[q.id];
            const claimable = !done && q.check(stats);
            return (
              <div key={q.id} className="quest-row" style={{opacity: done ? 1 : .85}}>
                <div className={`quest-check${done?' done':''}`} style={claimable ? {borderColor:'#A67B5B', color:'#A67B5B'} : {}}>
                  {done ? '✓' : (claimable ? '!' : '')}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'.72rem',fontWeight:700,color: done ? drawerUi.accent : drawerUi.text,textDecoration: done?'line-through':'none',lineHeight:1.3}}>
                    {q.name}
                  </div>
                  {done && questDone[q.id] && (
                    <div style={{fontSize:'.6rem',color:drawerUi.muted,marginTop:'.1rem'}}>{questDone[q.id]} 완료 🎉</div>
                  )}
                  {claimable && (
                    <div style={{fontSize:'.6rem',color:drawerUi.accent,marginTop:'.1rem',fontWeight:700}}>조건 달성 — 완료 버튼을 눌러 기록하세요</div>
                  )}
                </div>
                {claimable ? (
                  <button
                    onClick={() => markQuestDone(q.id, q.name)}
                    style={{
                      flexShrink:0, border:'none', borderRadius:'9999px', padding:'.25rem .55rem',
                      background:'#A67B5B', color:'#fff', fontSize:'.6rem', fontWeight:800,
                      fontFamily:'inherit', cursor:'pointer'
                    }}
                  >
                    완료
                  </button>
                ) : (
                  <span className="cat-badge" style={{background: QUEST_CAT_BG[q.cat], color: QUEST_CAT_COLOR[q.cat]}}>
                    {q.cat}
                  </span>
                )}
              </div>
            );
          })}
        </div>
      </div>

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
