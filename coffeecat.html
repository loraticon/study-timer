<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노션 위젯 통합 설정 페이지 v1.6</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'] },
                    colors: {
                        latte: { 50: '#F4F0EA', 100: '#EBE8DE', 300: '#D1CBBF', 500: '#A67B5B', 700: '#8B664B', 900: '#5C3A21' },
                        bgLight: '#FDFBF7'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #FDFBF7;
            color: #333;
        }
        .soft-card {
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .soft-card:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
<div id="root" class="min-h-screen p-6 md:p-12 font-sans flex justify-center"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

/* --- 아이콘 컴포넌트 --- */
const LinkIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>;
const CheckIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const SettingsIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
const DashboardIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>;
const BookIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
const TimerIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const CatClockIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 6 5.8 3.6 5 8"/><path d="M16 6l2.2-2.4L19 8"/><path d="M6 13a6 6 0 0 1 12 0c0 3-2.7 5-6 5s-6-2-6-5z"/><circle cx="9.5" cy="12" r=".8" fill="currentColor" stroke="none"/><circle cx="14.5" cy="12" r=".8" fill="currentColor" stroke="none"/><path d="M12 13.5v1"/><path d="M10.5 15.2c.6.5 2.4.5 3 0"/></svg>;

/* --- 저장소 유틸리티 --- */
const LS_KEY = 'cozy_widgets_setup_config';
const loadConfig = () => {
    try {
        const data = localStorage.getItem(LS_KEY);
        if (data) return JSON.parse(data);
    } catch (e) {
        console.error("로컬 스토리지 로드 실패", e);
    }
    return {
        proxyUrl: '',
        apiKey: '',
        recordDbId: '',
        subjectDbId: '',
        dashboardBaseUrl: '',
        todoDbId: '',
        statsDbId: '',
        noteDbId: '',
        wrongDbId: '',
        vocabDbId: '',
        testBaseUrl: '',
        testDbId: '',
        timerBaseUrl: '',
        catClockBaseUrl: '',
        questDbId: '',
        dashboardPageId: '',
        dashboardRelationProp: '대시보드 통계용',
        statPageId: '' // 이전 버전 호환용
    };
};

/* --- Notion 링크/ID 정리 유틸리티 --- */
const extractNotionId = (value) => {
    const raw = (value || '').trim();
    if (!raw) return '';

    // Notion URL에 포함된 32자리 ID 또는 하이픈 포함 UUID를 찾아 32자리 ID로 정리합니다.
    const matches = raw.match(/[0-9a-fA-F]{32}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g);
    if (matches && matches.length > 0) {
        return matches[matches.length - 1].replace(/-/g, '');
    }
    return raw.replace(/-/g, '');
};

const normalizeBaseUrl = (url) => (url || '').trim().split('?')[0];

/* --- 공통 입력 컴포넌트 --- */
const InputField = ({ label, value, onChange, type = "text", description = "" }) => (
    <div className="flex flex-col gap-1.5 mb-4">
        <label className="text-[13px] font-bold text-gray-700 flex items-center gap-1">
            {label}
        </label>
        {description && <p className="text-[11px] text-gray-500 mb-1">{description}</p>}
        <input 
            type={type} 
            value={value} 
            onChange={(e) => onChange(e.target.value)} 
            className="w-full bg-white border border-gray-200 rounded-xl p-3 text-sm font-medium text-gray-800 focus:outline-none focus:border-latte-500 focus:ring-1 focus:ring-latte-500 transition-all shadow-sm"
        />
    </div>
);

const App = () => {
    const [config, setConfig] = useState(loadConfig());
    const [copyStatus, setCopyStatus] = useState({ dashboard: false, test: false, timer: false, catClock: false });

    // 설정 변경 시 로컬 스토리지에 자동 저장
    useEffect(() => {
        localStorage.setItem(LS_KEY, JSON.stringify(config));
    }, [config]);

    const handleChange = (key, value) => {
        setConfig(prev => ({ ...prev, [key]: value.trim() }));
    };

    const handleNotionIdChange = (key, value) => {
        setConfig(prev => ({ ...prev, [key]: extractNotionId(value) }));
    };

    const copyToClipboard = (text, type) => {
        try {
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            setCopyStatus(prev => ({ ...prev, [type]: true }));
            setTimeout(() => {
                setCopyStatus(prev => ({ ...prev, [type]: false }));
            }, 2000);
        } catch (e) {
            alert('복사에 실패했습니다.');
        }
    };

    const generateDashboardLink = () => {
        if (!config.dashboardBaseUrl) {
            alert("대시보드 HTML 호스팅 주소를 입력해주세요.");
            return;
        }
        
        const params = new URLSearchParams();
        params.set('proxyUrl', config.proxyUrl);
        params.set('apiKey', config.apiKey);
        params.set('recordDbId', config.recordDbId);
        params.set('subjectDbId', config.subjectDbId);
        params.set('todoDbId', config.todoDbId);
        params.set('statsDbId', config.statsDbId);
        params.set('noteDbId', config.noteDbId);
        params.set('wrongDbId', config.wrongDbId);
        
        // 대시보드 단어장 섹션에서 사용하는 파라미터입니다.
        // 단어장 DB와 테스트 DB가 모두 있어야 대시보드의 단어장 영역이 활성화됩니다.
        if (config.vocabDbId) {
            params.set('vocabDbId', extractNotionId(config.vocabDbId));
        }
        if (config.testDbId) {
            params.set('testDbId', extractNotionId(config.testDbId));
        }
        
        // 홈 탭에서 새 투두를 만들 때 대시보드 통계용 페이지와 자동 연결하기 위한 파라미터
        const dashboardPageId = config.dashboardPageId || config.statPageId || '';
        if (dashboardPageId) {
            params.set('dashboardPageId', extractNotionId(dashboardPageId));
        }
        if (config.dashboardRelationProp) {
            params.set('dashboardRelationProp', config.dashboardRelationProp);
        }
        
        const baseUrl = normalizeBaseUrl(config.dashboardBaseUrl);
        const finalUrl = `${baseUrl}?${params.toString()}`;
        
        copyToClipboard(finalUrl, 'dashboard');
    };

    const generateTestLink = () => {
        if (!config.testBaseUrl) {
            alert("단어 테스트 HTML 호스팅 주소를 입력해주세요.");
            return;
        }

        const params = new URLSearchParams();
        params.set('proxyUrl', config.proxyUrl);
        params.set('apiKey', config.apiKey);
        params.set('subjectDbId', config.subjectDbId);
        params.set('testDbId', config.testDbId);
        
        const baseUrl = normalizeBaseUrl(config.testBaseUrl);
        const finalUrl = `${baseUrl}?${params.toString()}`;
        
        copyToClipboard(finalUrl, 'test');
    };

    const generateTimerLink = () => {
        if (!config.timerBaseUrl) {
            alert("타이머 HTML 호스팅 주소를 입력해주세요.");
            return;
        }

        const params = new URLSearchParams();
        params.set('proxyUrl', config.proxyUrl);
        params.set('apiKey', config.apiKey);
        params.set('recordDbId', config.recordDbId);
        params.set('subjectDbId', config.subjectDbId);
        
        // 대시보드 통계용 페이지와 자동 연결하기 위한 파라미터
        // 이전 버전에서 저장된 statPageId가 있으면 dashboardPageId로 함께 사용합니다.
        const dashboardPageId = config.dashboardPageId || config.statPageId || '';
        if (dashboardPageId) {
            params.set('dashboardPageId', extractNotionId(dashboardPageId));
        }
        if (config.dashboardRelationProp) {
            params.set('dashboardRelationProp', config.dashboardRelationProp);
        }
        
        const baseUrl = normalizeBaseUrl(config.timerBaseUrl);
        const finalUrl = `${baseUrl}?${params.toString()}`;
        
        copyToClipboard(finalUrl, 'timer');
    };

    const generateCatClockLink = () => {
        if (!config.catClockBaseUrl) {
            alert("냥이카페시계 HTML 호스팅 주소를 입력해주세요.");
            return;
        }

        const params = new URLSearchParams();
        params.set('proxyUrl', config.proxyUrl);
        params.set('apiKey', config.apiKey);
        params.set('recordDbId', config.recordDbId);
        if (config.questDbId) {
            params.set('questDbId', extractNotionId(config.questDbId));
        }
        
        const baseUrl = normalizeBaseUrl(config.catClockBaseUrl);
        const finalUrl = `${baseUrl}?${params.toString()}`;
        
        copyToClipboard(finalUrl, 'catClock');
    };

    return (
        <div className="w-full max-w-7xl flex flex-col gap-8">
            <header className="flex items-center gap-3 border-b border-gray-200 pb-4 mb-2">
                <div className="w-10 h-10 bg-latte-50 rounded-xl flex items-center justify-center text-latte-700">
                    <SettingsIcon />
                </div>
                <div>
                    <h1 className="text-2xl font-bold text-gray-800 tracking-tight">위젯 연결 스튜디오</h1>
                    <p className="text-sm text-gray-500 font-medium">한 번 입력해두면 모든 위젯의 노션 임베드 링크를 원클릭으로 생성할 수 있습니다.</p>
                </div>
            </header>

            {/* --- 공통 API 및 DB 설정 --- */}
            <section className="bg-white rounded-3xl p-6 md:p-8 soft-card border border-[#EBE8DE]">
                <h2 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <span className="text-latte-500">⚙️</span> 공통 설정
                </h2>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6">
                    <InputField 
                        label="Cloudflare Proxy URL" 
                        value={config.proxyUrl} 
                        onChange={(v) => handleChange('proxyUrl', v)} 
                    />
                    <InputField 
                        label="Notion API Key" 
                        type="password"
                        value={config.apiKey} 
                        onChange={(v) => handleChange('apiKey', v)} 
                    />
                    <InputField 
                        label="공부 기록 DB ID" 
                        description="대시보드와 타이머 위젯에서 공부 시간을 기록하고 불러올 때 공통으로 사용됩니다."
                        value={config.recordDbId} 
                        onChange={(v) => handleChange('recordDbId', v)} 
                    />
                    <InputField 
                        label="공용 과목 DB ID" 
                        description="대시보드, 단어 테스트, 타이머에서 공통으로 참조하는 과목 목록입니다."
                        value={config.subjectDbId} 
                        onChange={(v) => handleChange('subjectDbId', v)} 
                    />
                </div>
            </section>

            {/* --- 개별 위젯 설정 카드 (가로 정렬 유지) --- */}
            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 items-start">
                
                {/* 1. 대시보드 위젯 설정 */}
                <section className="bg-white rounded-3xl p-6 md:p-8 soft-card border border-[#EBE8DE] flex flex-col">
                    <div className="flex items-center gap-2 mb-6 pb-4 border-b border-gray-100">
                        <div className="text-latte-500"><DashboardIcon /></div>
                        <h2 className="text-lg font-bold text-gray-800">대시보드</h2>
                    </div>

                    <div className="flex-1">
                        <InputField 
                            label="대시보드 HTML 호스팅 주소" 
                            description="Github Pages 등 외부에서 접근 가능한 dashboard.html 주소를 입력하세요."
                            value={config.dashboardBaseUrl} 
                            onChange={(v) => handleChange('dashboardBaseUrl', v)} 
                        />
                        <InputField 
                            label="투두리스트 DB ID" 
                            value={config.todoDbId} 
                            onChange={(v) => handleChange('todoDbId', v)} 
                        />
                        <InputField 
                            label="누적 통계 DB ID" 
                            value={config.statsDbId} 
                            onChange={(v) => handleChange('statsDbId', v)} 
                        />
                        <InputField 
                            label="학습 노트 DB ID" 
                            value={config.noteDbId} 
                            onChange={(v) => handleChange('noteDbId', v)} 
                        />
                        <InputField 
                            label="오답 노트 DB ID" 
                            value={config.wrongDbId} 
                            onChange={(v) => handleChange('wrongDbId', v)} 
                        />

                        <div className="mt-6 mb-4 bg-[#F0EDF8] p-4 rounded-xl border border-[#D7D0EE]">
                            <p className="text-[12px] font-bold text-[#6B5FA6] mb-1">📚 대시보드 단어장 섹션</p>
                            <p className="text-[11px] text-[#7B6FB6] leading-relaxed font-medium">
                                대시보드 홈에서 오늘 추가된 단어, 복습 단어, 마스터 단어를 보여줄 때 사용합니다. 단어장 DB ID와 테스트 DB ID를 모두 입력해야 활성화됩니다.
                            </p>
                        </div>
                        <InputField 
                            label="단어장 DB ID" 
                            description="대시보드 단어장 섹션에서 단어 원본과 마스터 단어를 불러올 때 사용합니다."
                            value={config.vocabDbId || ''} 
                            onChange={(v) => handleChange('vocabDbId', v)} 
                        />
                        <InputField 
                            label="테스트 DB ID" 
                            description="단어 테스트 결과, 누적 통과 횟수, 다시 학습 상태를 불러올 때 사용합니다. 단어 테스트 위젯과 같은 DB ID입니다."
                            value={config.testDbId || ''} 
                            onChange={(v) => handleChange('testDbId', v)} 
                        />
                    </div>

                    <button 
                        onClick={generateDashboardLink}
                        className={`w-full mt-6 py-4 rounded-2xl font-bold text-sm transition-colors flex justify-center items-center gap-2 shadow-sm
                            ${copyStatus.dashboard ? 'bg-[#849F71] text-white' : 'bg-latte-500 hover:bg-latte-700 text-white'}`}
                    >
                        {copyStatus.dashboard ? (
                            <><CheckIcon /> 대시보드 링크 복사 완료!</>
                        ) : (
                            <><LinkIcon /> 대시보드 링크 생성</>
                        )}
                    </button>
                </section>

                {/* 2. 단어 테스트 위젯 설정 */}
                <section className="bg-white rounded-3xl p-6 md:p-8 soft-card border border-[#EBE8DE] flex flex-col">
                    <div className="flex items-center gap-2 mb-6 pb-4 border-b border-gray-100">
                        <div className="text-latte-700"><BookIcon /></div>
                        <h2 className="text-lg font-bold text-gray-800">단어 테스트</h2>
                    </div>

                    <div className="flex-1">
                        <InputField 
                            label="단어 테스트 HTML 호스팅 주소" 
                            description="Github Pages 등 외부에서 접근 가능한 test.html 주소를 입력하세요."
                            value={config.testBaseUrl} 
                            onChange={(v) => handleChange('testBaseUrl', v)} 
                        />
                        <InputField 
                            label="단어 테스트 DB ID" 
                            description="대시보드 단어장 섹션과 공용으로 사용하는 테스트 DB입니다."
                            value={config.testDbId} 
                            onChange={(v) => handleChange('testDbId', v)} 
                        />
                        <div className="mt-4 bg-[#F4F0EA] p-4 rounded-xl border border-[#D1CBBF]">
                            <p className="text-[11px] text-gray-500 leading-relaxed font-medium">
                                공통 설정에 입력된 <span className="font-bold text-gray-700">과목 DB ID</span>를 자동으로 가져와 함께 링크를 생성합니다.
                            </p>
                        </div>
                    </div>

                    <button 
                        onClick={generateTestLink}
                        className={`w-full mt-6 py-4 rounded-2xl font-bold text-sm transition-colors flex justify-center items-center gap-2 shadow-sm
                            ${copyStatus.test ? 'bg-[#849F71] text-white' : 'bg-gray-800 hover:bg-gray-700 text-white'}`}
                    >
                        {copyStatus.test ? (
                            <><CheckIcon /> 단어 테스트 링크 복사 완료!</>
                        ) : (
                            <><LinkIcon /> 단어 테스트 링크 생성</>
                        )}
                    </button>
                </section>

                {/* 3. 타이머 위젯 설정 */}
                <section className="bg-white rounded-3xl p-6 md:p-8 soft-card border border-[#EBE8DE] flex flex-col">
                    <div className="flex items-center gap-2 mb-6 pb-4 border-b border-gray-100">
                        <div className="text-[#849F71]"><TimerIcon /></div>
                        <h2 className="text-lg font-bold text-gray-800">타이머</h2>
                    </div>

                    <div className="flex-1">
                        <InputField 
                            label="타이머 HTML 호스팅 주소" 
                            description="Github Pages 등 외부에서 접근 가능한 timer.html 주소를 입력하세요."
                            value={config.timerBaseUrl} 
                            onChange={(v) => handleChange('timerBaseUrl', v)} 
                        />
                        
                        <InputField 
                            label="대시보드 통계용 페이지 링크 또는 ID (선택)" 
                            description="공부 기록 추가 시 자동 연결할 '대시보드 통계용' 페이지 링크를 붙여넣어도 됩니다. ID만 자동 추출됩니다."
                            value={config.dashboardPageId || config.statPageId || ''} 
                            onChange={(v) => handleNotionIdChange('dashboardPageId', v)} 
                        />
                        <InputField 
                            label="대시보드 관계형 속성 이름" 
                            description="공부 기록 DB에 있는 관계형 속성 이름입니다. 기본값은 '대시보드 통계용'입니다."
                            value={config.dashboardRelationProp || '대시보드 통계용'} 
                            onChange={(v) => handleChange('dashboardRelationProp', v || '대시보드 통계용')} 
                        />

                        <div className="mt-4 bg-[#F3F8F5] p-4 rounded-xl border border-[#D1E0C9]">
                            <p className="text-[11px] text-[#5a8a6e] leading-relaxed font-medium">
                                공통 설정의 <span className="font-bold text-[#355b44]">공부 기록 DB ID</span>, <span className="font-bold text-[#355b44]">과목 DB ID</span>와 함께 대시보드 통계용 페이지 연결값을 타이머 링크에 포함합니다.
                            </p>
                        </div>
                    </div>

                    <button 
                        onClick={generateTimerLink}
                        className={`w-full mt-6 py-4 rounded-2xl font-bold text-sm transition-colors flex justify-center items-center gap-2 shadow-sm
                            ${copyStatus.timer ? 'bg-[#8B664B] text-white' : 'bg-[#849F71] hover:bg-[#728d5f] text-white'}`}
                    >
                        {copyStatus.timer ? (
                            <><CheckIcon /> 타이머 링크 복사 완료!</>
                        ) : (
                            <><LinkIcon /> 타이머 링크 생성</>
                        )}
                    </button>
                </section>

                {/* 4. 냥이카페시계 위젯 설정 */}
                <section className="bg-white rounded-3xl p-6 md:p-8 soft-card border border-[#EBE8DE] flex flex-col">
                    <div className="flex items-center gap-2 mb-6 pb-4 border-b border-gray-100">
                        <div className="text-[#A67B5B]"><CatClockIcon /></div>
                        <h2 className="text-lg font-bold text-gray-800">냥이카페시계</h2>
                    </div>

                    <div className="flex-1">
                        <InputField 
                            label="냥이카페시계 HTML 호스팅 주소" 
                            description="Github Pages 등 외부에서 접근 가능한 coffeecat.html 주소를 입력하세요."
                            value={config.catClockBaseUrl || ''} 
                            onChange={(v) => handleChange('catClockBaseUrl', v)} 
                        />
                        <InputField 
                            label="퀘스트 DB ID" 
                            description="냥이카페시계의 퀘스트 달성 기록과 꾸미기 해금 조건에 사용됩니다."
                            value={config.questDbId || ''} 
                            onChange={(v) => handleNotionIdChange('questDbId', v)} 
                        />

                        <div className="mt-4 bg-[#FDF8F3] p-4 rounded-xl border border-[#EADBCB]">
                            <p className="text-[11px] text-[#8B664B] leading-relaxed font-medium">
                                공통 설정의 <span className="font-bold text-[#5C3A21]">공부 기록 DB ID</span>를 함께 사용해 오늘의 공부 기록, 커피 기록, 퀘스트 진행도를 불러옵니다.
                            </p>
                        </div>
                    </div>

                    <button 
                        onClick={generateCatClockLink}
                        className={`w-full mt-6 py-4 rounded-2xl font-bold text-sm transition-colors flex justify-center items-center gap-2 shadow-sm
                            ${copyStatus.catClock ? 'bg-[#849F71] text-white' : 'bg-[#A67B5B] hover:bg-[#8B664B] text-white'}`}
                    >
                        {copyStatus.catClock ? (
                            <><CheckIcon /> 냥이카페시계 링크 복사 완료!</>
                        ) : (
                            <><LinkIcon /> 냥이카페시계 링크 생성</>
                        )}
                    </button>
                </section>

            </div>
            
            <footer className="text-center text-[11px] text-gray-400 font-medium py-6">
                이 페이지의 입력 데이터는 사용자 브라우저(로컬 스토리지)에만 안전하게 보관되며 외부로 전송되지 않습니다.
            </footer>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
