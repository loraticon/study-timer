<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코지 카페 단어 테스트</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        latte: {
                            50: '#F4F0EA',
                            100: '#EBE8DE',
                            300: '#D1CBBF',
                            500: '#A67B5B',
                            700: '#8B664B',
                            900: '#5C3A21',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        .soft-shadow { box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .input-underline { border-bottom: 2px solid #EBE8DE; transition: border-color 0.2s; }
        .input-underline:focus { border-bottom-color: #A67B5B; outline: none; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake { animation: shake 0.3s ease; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
    </style>
</head>
<body>
<div id="root" class="w-full h-full flex justify-center items-center"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ── 아이콘 ── */
const CheckIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const XIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const SunIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="4.22" x2="19.78" y2="5.64"/></svg>;
const ArchiveIcon = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>;
const ZapIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>;
const SmileIcon = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>;
const GearIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
const NotionIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4.459 4.208c.746.606 1.026.56 2.428.466l13.215-.793c.28 0 .047-.28-.046-.326L17.86 1.968c-.42-.326-.981-.7-2.055-.607L3.01 2.295c-.466.046-.56.28-.374.466zm.793 3.08v13.904c0 .747.373 1.027 1.214.98l14.523-.84c.841-.046.935-.56.935-1.167V6.354c0-.606-.233-.933-.748-.887l-15.177.887c-.56.047-.747.327-.747.933zm14.337.745c.093.42 0 .84-.42.887l-.7.14v10.264c-.608.327-1.168.514-1.635.514-.748 0-.935-.234-1.495-.933l-4.577-7.186v6.952L12.21 19s0 .84-1.168.84l-3.222.186c-.093-.186 0-.653.327-.746l.84-.233V9.854L7.822 9.76c-.094-.42.14-1.026.793-1.073l3.456-.233 4.764 7.279v-6.44l-1.215-.14c-.093-.514.28-.887.747-.933z"/></svg>;

const BATCH_SIZE = 5;

/* ── 로컬스토리지 & URL 파라미터 연동 ── */
const LS_CONFIG = 'cozy_test_config';
const loadConfig = () => {
    try {
        const params = new URLSearchParams(window.location.search);
        if (params.has('apiKey') && params.has('testDbId')) {
            const urlConfig = {
                proxyUrl: params.get('proxyUrl') || '',
                apiKey: params.get('apiKey') || '',
                testDbId: params.get('testDbId') || '',
                subjectDbId: params.get('subjectDbId') || '',
                saved: true 
            };
            // 로컬스토리지에도 백업 (새로고침 시 유지)
            localStorage.setItem(LS_CONFIG, JSON.stringify(urlConfig));
            return urlConfig;
        }
        return JSON.parse(localStorage.getItem(LS_CONFIG)) || { proxyUrl:'', apiKey:'', testDbId:'', subjectDbId:'', saved: false };
    } catch {
        return { proxyUrl:'', apiKey:'', testDbId:'', subjectDbId:'', saved: false };
    }
};
const saveConfig = (cfg) => localStorage.setItem(LS_CONFIG, JSON.stringify(cfg));

const App = () => {
    /* ── 설정 및 데이터 상태 ── */
    const [config, setConfig] = useState(loadConfig());
    const [showSetup, setShowSetup] = useState(!config.saved);
    const [setupForm, setSetupForm] = useState(config);
    const [setupError, setSetupError] = useState('');
    const [setupLoading, setSetupLoading] = useState(false);
    const [copySuccess, setCopySuccess] = useState(false);
    
    const [isLoadingData, setIsLoadingData] = useState(false);
    const [appState, setAppState] = useState('ready'); // 'ready' -> 'testing' -> 'result'
    const [allQuestions, setAllQuestions] = useState([]);
    
    /* ── 테스트 진행 상태 ── */
    const [testQueue, setTestQueue] = useState([]);
    const [sessionType, setSessionType] = useState('today'); // 'today' or 'pending'
    const [currentIndex, setCurrentIndex] = useState(0);
    const [userInput, setUserInput] = useState('');
    const [isRevealed, setIsRevealed] = useState(false);
    const [isShaking, setIsShaking] = useState(false);
    const [results, setResults] = useState({});
    
    const inputRef = useRef(null);

    /* ── Notion API 호출 프록시 ── */
    const notionFetch = useCallback(async (path, options = {}) => {
        const { proxyUrl, apiKey } = config;
        if (!proxyUrl || !apiKey) throw new Error('설정이 필요해요');
        const res = await fetch(`${proxyUrl}${path}`, {
            ...options,
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'x-notion-version': '2022-06-28',
                ...(options.headers || {}),
            },
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.message || `API 오류 (${res.status})`);
        }
        return res.json();
    }, [config]);

    /* ── 데이터 로드 (문제 및 과목 불러오기) ── */
    const fetchData = useCallback(async () => {
        if (!config.saved || !config.testDbId) return;
        setIsLoadingData(true);
        try {
            // 1. 과목 DB 데이터 가져오기 (매핑용)
            const subjectMap = {};
            if (config.subjectDbId) {
                try {
                    const subjRes = await notionFetch(`/v1/databases/${config.subjectDbId}/query`, { method: 'POST', body: JSON.stringify({ page_size: 100 }) });
                    subjRes.results.forEach(page => {
                        // 과목 이름은 보통 '이름' 타이틀 속성에 있습니다
                        const nameProp = Object.values(page.properties).find(p => p.type === 'title');
                        const name = nameProp?.title?.[0]?.plain_text || '미선택';
                        subjectMap[page.id] = name;
                    });
                } catch (e) { console.warn("과목 로드 실패", e); }
            }

            // 2. 테스트 DB에서 '오늘 복습 필요'가 체크된 항목만 가져오기
            const testRes = await notionFetch(`/v1/databases/${config.testDbId}/query`, {
                method: 'POST',
                body: JSON.stringify({
                    filter: { property: '오늘 복습 필요', checkbox: { equals: true } },
                    page_size: 100
                })
            });

            const parsedQuestions = testRes.results.map(page => {
                const props = page.properties;
                
                // 속성 매핑 (이미지 참고)
                const summary = props['문제 요약']?.rich_text?.[0]?.plain_text || '요약 없음';
                const content = props['문제 내용']?.rich_text?.[0]?.plain_text || '내용 없음';
                const answer = props['정답']?.rich_text?.[0]?.plain_text || props['정답']?.title?.[0]?.plain_text || '정답 없음';
                
                // 과목 매핑 (관계형)
                let subject = '미분류';
                const subjectRelation = props['과목']?.relation;
                if (subjectRelation && subjectRelation.length > 0) {
                    subject = subjectMap[subjectRelation[0].id] || '과목명 불러오기 실패';
                }

                // 날짜 비교로 Today / Pending 분류
                const nextDateIso = props['다음 복습일']?.date?.start;
                const nextDateObj = nextDateIso ? new Date(nextDateIso) : new Date();
                const todayObj = new Date();
                
                // 시간 자정으로 초기화 후 비교
                nextDateObj.setHours(0,0,0,0);
                todayObj.setHours(0,0,0,0);
                
                const category = nextDateObj.getTime() < todayObj.getTime() ? 'pending' : 'today';

                return { id: page.id, category, subject, summary, content, answer };
            });
            
            setAllQuestions(parsedQuestions);
        } catch (e) {
            console.error(e);
            alert("데이터를 불러오는 중 오류가 발생했습니다: " + e.message);
        } finally {
            setIsLoadingData(false);
        }
    }, [config, notionFetch]);

    useEffect(() => {
        if (config.saved) fetchData();
    }, [config.saved, fetchData]);

    /* ── 설정 저장 및 링크 복사 ── */
    const handleSetupSave = async () => {
        const { proxyUrl, apiKey, testDbId, subjectDbId } = setupForm;
        if (!proxyUrl || !apiKey || !testDbId) { setSetupError('필수 항목(Proxy, API 키, 테스트 DB)을 입력해주세요.'); return; }
        setSetupLoading(true); setSetupError('');
        setCopySuccess(false);
        try {
            // 연결 테스트
            const testRes = await fetch(`${proxyUrl}/v1/databases/${testDbId}/query`, {
                method: 'POST',
                headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'x-notion-version':'2022-06-28' },
                body: JSON.stringify({ page_size: 1 }),
            });
            if (!testRes.ok) throw new Error('연결 실패 — API 키 또는 DB ID를 확인해주세요');
            
            // 연결 성공 시 URL 파라미터가 포함된 새 링크 생성
            const baseUrl = window.location.href.split('?')[0];
            const params = new URLSearchParams();
            params.set('proxyUrl', proxyUrl);
            params.set('apiKey', apiKey);
            params.set('testDbId', testDbId);
            if (subjectDbId) params.set('subjectDbId', subjectDbId);
            
            const embedUrl = `${baseUrl}?${params.toString()}`;
            
            // 클립보드에 복사 (iframe 제한을 피하기 위한 execCommand 방식 사용)
            const el = document.createElement('textarea');
            el.value = embedUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            setCopySuccess(true);
            
            // 로컬 환경에서도 즉시 보이도록 상태 업데이트
            const newConfig = { ...setupForm, saved: true };
            saveConfig(newConfig);
            setConfig(newConfig);

            setTimeout(() => {
                setShowSetup(false);
                setCopySuccess(false);
            }, 2000);

        } catch (e) {
            setSetupError(e.message);
        } finally {
            setSetupLoading(false);
        }
    };


    /* ── 테스트 로직 ── */
    const todayQuestions = allQuestions.filter(q => q.category === 'today');
    const pendingQuestions = allQuestions.filter(q => q.category === 'pending');

    const startTest = (type, limit) => {
        const sourceQueue = type === 'today' ? todayQuestions : pendingQuestions;
        const queue = limit ? sourceQueue.slice(0, limit) : [...sourceQueue];
        
        setSessionType(type);
        setTestQueue(queue);
        setAppState('testing');
        setCurrentIndex(0);
        setResults({});
        setUserInput('');
        setIsRevealed(false);
    };

    const handleCheckAnswer = (e) => {
        if (e) e.preventDefault();
        if (!userInput.trim()) {
            setIsShaking(true);
            setTimeout(() => setIsShaking(false), 300);
            return;
        }
        setIsRevealed(true);
    };

    const handleResult = (isPass) => {
        const currentQ = testQueue[currentIndex];
        setResults(prev => ({ ...prev, [currentQ.id]: isPass }));
        
        if (currentIndex + 1 < testQueue.length) {
            setCurrentIndex(prev => prev + 1);
            setUserInput('');
            setIsRevealed(false);
            if (inputRef.current) setTimeout(() => inputRef.current.focus(), 50);
        } else {
            // (차후 보류된 API 연동 시) 여기서 노션 DB의 속성들을 PATCH 합니다.
            // 임시로 클라이언트 뷰에서만 방금 푼 문제 제거
            const completedIds = testQueue.map(q => q.id);
            setAllQuestions(prev => prev.filter(q => !completedIds.includes(q.id)));
            setAppState('result');
        }
    };


    /* ══════ 화면 0: 설정 화면 ══════ */
    if (showSetup) return (
        <div className="w-full max-w-[420px] bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] overflow-hidden soft-shadow">
            <div className="p-10">
                <div className="flex items-center gap-2 mb-1">
                    <NotionIcon/>
                    <span className="text-xs font-bold tracking-widest text-gray-400 uppercase">Notion 연결</span>
                </div>
                <h2 className="text-xl font-bold text-gray-800 mb-6">테스트 DB 설정</h2>

                <div className="space-y-5">
                    {[
                        { key:'proxyUrl', label:'Cloudflare Workers URL', placeholder:'https://your-worker.workers.dev', type:'text' },
                        { key:'apiKey',   label:'Notion API 키',          placeholder:'secret_xxxxxxxxxxxxxx',           type:'password' },
                        { key:'testDbId', label:'테스트 DB ID (필수)',     placeholder:'32자리 ID',                       type:'text' },
                        { key:'subjectDbId', label:'과목 DB ID (선택)',    placeholder:'32자리 ID',                       type:'text' },
                    ].map(({ key, label, placeholder, type }) => (
                        <div key={key}>
                            <label className="text-xs font-bold text-gray-500 uppercase tracking-wide block mb-1.5">{label}</label>
                            <input
                                type={type}
                                value={setupForm[key]}
                                onChange={e => setSetupForm(f => ({ ...f, [key]: e.target.value.trim() }))}
                                placeholder={placeholder}
                                className="w-full text-sm border-b-2 border-gray-200 bg-transparent text-gray-800 py-2 focus:outline-none focus:border-[#A67B5B] placeholder-gray-300"
                            />
                        </div>
                    ))}

                    {setupError && <p className="text-xs text-red-400 font-medium">{setupError}</p>}

                    <button onClick={handleSetupSave} disabled={setupLoading || copySuccess}
                        className={`w-full mt-4 py-4 rounded-2xl text-white font-bold text-sm transition-colors flex items-center justify-center gap-2 shadow-sm
                            ${copySuccess ? 'bg-[#849F71]' : 'bg-[#A67B5B] hover:bg-[#8B664B]'}`}>
                        {setupLoading ? (
                            <><span className="spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"/><span>연결 확인 중...</span></>
                        ) : copySuccess ? (
                            <><CheckIcon/><span>링크 복사 완료! 노션에 붙여넣으세요</span></>
                        ) : (
                            <><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            <span>노션 임베드 링크 복사</span></>
                        )}
                    </button>
                    {config.saved && (
                        <button onClick={() => setShowSetup(false)} className="w-full py-2 text-xs text-gray-400 hover:text-gray-600 transition-colors">
                            취소
                        </button>
                    )}
                </div>
            </div>
        </div>
    );

    /* ══════ 화면 1: 준비 화면 (두 영역으로 분리) ══════ */
    if (appState === 'ready') {
        const hasToday = todayQuestions.length > 0;
        const hasPending = pendingQuestions.length > 0;
        const isPendingOverloaded = pendingQuestions.length > BATCH_SIZE;

        return (
            <div className="w-full max-w-[420px] bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] p-8 flex flex-col justify-center min-h-[580px] soft-shadow relative overflow-hidden">
                {/* 설정 버튼 */}
                <button onClick={() => setShowSetup(true)} className="absolute top-6 right-6 text-gray-300 hover:text-latte-500 transition-colors">
                    <GearIcon />
                </button>

                <div className="mb-6 text-center">
                    <h1 className="text-2xl font-bold text-gray-800">코지 단어장</h1>
                    <p className="text-gray-500 text-sm mt-1">오늘도 가볍게 지식을 쌓아봐요 ☕</p>
                </div>
                
                {isLoadingData ? (
                    <div className="flex-1 flex flex-col items-center justify-center py-10">
                        <span className="spin w-8 h-8 border-[3px] border-latte-500 border-t-transparent rounded-full mb-3"></span>
                        <span className="text-sm text-gray-400">데이터를 불러오는 중...</span>
                    </div>
                ) : (
                    <div className="flex flex-col gap-5">
                        {/* 오늘의 테스트 섹션 (우선순위 1) */}
                        <div className="bg-white rounded-3xl p-5 border-2 border-latte-100 flex flex-col relative overflow-hidden soft-shadow">
                            <div className="flex justify-between items-start mb-4">
                                <div className="flex items-center gap-2">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${hasToday ? 'bg-latte-50 text-latte-500' : 'bg-gray-50 text-gray-300'}`}>
                                        <SunIcon />
                                    </div>
                                    <div>
                                        <h2 className={`font-bold ${hasToday ? 'text-gray-800' : 'text-gray-400'}`}>오늘의 테스트</h2>
                                        <p className="text-[11px] text-gray-400 font-medium">{hasToday ? '가장 먼저 끝내야 할 미션' : '모두 완료했어요!'}</p>
                                    </div>
                                </div>
                                <div className={`text-2xl font-black ${hasToday ? 'text-latte-500' : 'text-gray-300'}`}>
                                    {todayQuestions.length}
                                </div>
                            </div>
                            
                            <button 
                                onClick={() => startTest('today')}
                                disabled={!hasToday}
                                className={`w-full py-3.5 rounded-2xl font-bold text-sm transition-colors flex justify-center items-center gap-2
                                    ${hasToday ? 'bg-latte-500 hover:bg-latte-700 text-white shadow-sm' : 'bg-gray-50 text-gray-400 cursor-not-allowed'}`}
                            >
                                {hasToday ? '오늘의 테스트 시작' : '완료됨'}
                            </button>
                        </div>

                        {/* 밀린 복습 섹션 (우선순위 2) */}
                        <div className="bg-[#F4F0EA] rounded-3xl p-5 border border-[#EBE8DE] flex flex-col">
                            <div className="flex justify-between items-start mb-4">
                                <div className="flex items-center gap-2">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center ${hasPending ? 'bg-white text-latte-700 shadow-sm' : 'bg-[#EBE8DE] text-gray-400'}`}>
                                        <ArchiveIcon />
                                    </div>
                                    <div>
                                        <h2 className={`font-bold ${hasPending ? 'text-gray-800' : 'text-gray-400'}`}>밀린 복습</h2>
                                        <p className="text-[11px] text-gray-500 font-medium">{hasPending ? '여유가 될 때 조금씩 해결해요' : '밀린 문제가 없어요!'}</p>
                                    </div>
                                </div>
                                <div className={`text-2xl font-black ${hasPending ? 'text-gray-800' : 'text-gray-300'}`}>
                                    {pendingQuestions.length}
                                </div>
                            </div>
                            
                            {hasPending ? (
                                <div className="flex gap-2">
                                    {isPendingOverloaded ? (
                                        <>
                                            <button 
                                                onClick={() => startTest('pending', BATCH_SIZE)}
                                                className="flex-[2] py-3.5 rounded-2xl bg-white hover:bg-latte-50 text-latte-700 font-bold text-sm transition-colors shadow-sm flex justify-center items-center gap-1 border border-[#EBE8DE]"
                                            >
                                                <ZapIcon /> {BATCH_SIZE}개만 풀기
                                            </button>
                                            <button 
                                                onClick={() => startTest('pending')}
                                                className="flex-1 py-3.5 rounded-2xl bg-gray-200 hover:bg-gray-300 text-gray-600 font-bold text-sm transition-colors text-center"
                                            >
                                                전체
                                            </button>
                                        </>
                                    ) : (
                                        <button 
                                            onClick={() => startTest('pending')}
                                            className="w-full py-3.5 rounded-2xl bg-white hover:bg-latte-50 text-latte-700 font-bold text-sm transition-colors shadow-sm border border-[#EBE8DE]"
                                        >
                                            밀린 복습 시작
                                        </button>
                                    )}
                                </div>
                            ) : (
                                <div className="w-full py-3.5 rounded-2xl font-bold text-sm bg-[#EBE8DE]/50 text-gray-400 text-center cursor-not-allowed">
                                    깔끔합니다 ✨
                                </div>
                            )}
                        </div>
                    </div>
                )}
            </div>
        );
    }

    /* ══════ 화면 2: 테스트 진행 화면 ══════ */
    if (appState === 'testing') {
        const currentQ = testQueue[currentIndex];
        const isExactMatch = userInput.replace(/\s+/g, '') === currentQ.answer.replace(/\s+/g, '');
        
        // 상단 라벨 (어떤 세션인지 표시)
        const sessionLabel = sessionType === 'today' ? '오늘의 테스트' : '밀린 복습';
        const sessionIcon = sessionType === 'today' ? '☀️' : '📦';

        return (
            <div className="w-full max-w-[420px] bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] flex flex-col min-h-[580px] soft-shadow overflow-hidden relative">
                {/* 상단 프로그레스 바 & 헤더 */}
                <div className="pt-8 px-8 pb-4 relative">
                    <div className="absolute top-0 left-0 h-1.5 bg-latte-100 w-full">
                        <div 
                            className="h-full bg-latte-500 transition-all duration-300 ease-out" 
                            style={{ width: `${((currentIndex) / testQueue.length) * 100}%` }}
                        ></div>
                    </div>
                    <div className="flex justify-between items-center mb-4">
                        <span className="px-3 py-1 bg-white border border-[#EBE8DE] rounded-full text-[11px] font-bold text-latte-700 flex items-center gap-1">
                            <span>{sessionIcon}</span> {sessionLabel}
                        </span>
                        <span className="text-sm font-bold text-latte-300">
                            {currentIndex + 1} / {testQueue.length}
                        </span>
                    </div>
                    <div className="text-[11px] font-bold text-gray-400">과목: {currentQ.subject}</div>
                </div>

                {/* 문제 내용 영역 */}
                <div className="px-8 flex-1 flex flex-col">
                    <h2 className="text-xl font-bold text-gray-800 leading-snug mb-3 mt-1">
                        {currentQ.summary}
                    </h2>
                    <p className="text-sm text-gray-500 leading-relaxed bg-white p-4 rounded-2xl border border-[#EBE8DE]">
                        {currentQ.content}
                    </p>

                    <div className="mt-auto mb-8">
                        {!isRevealed ? (
                            <form onSubmit={handleCheckAnswer} className="relative mt-8">
                                <label className="text-[11px] font-bold text-latte-300 uppercase tracking-widest block mb-2">정답을 입력하세요</label>
                                <div className={`relative ${isShaking ? 'animate-shake' : ''}`}>
                                    <input 
                                        ref={inputRef}
                                        type="text" 
                                        value={userInput}
                                        onChange={(e) => setUserInput(e.target.value)}
                                        placeholder="✏️ 여기에 정답 입력..."
                                        className="w-full bg-transparent text-lg font-bold text-gray-800 pb-2 input-underline placeholder:text-gray-300 placeholder:font-normal"
                                        autoFocus
                                        autoComplete="off"
                                    />
                                </div>
                                <button type="submit" className="w-full py-3.5 mt-6 rounded-2xl bg-gray-800 hover:bg-gray-700 text-white font-bold text-sm transition-colors shadow-sm">
                                    정답 확인
                                </button>
                            </form>
                        ) : (
                            <div className="mt-6 animate-fade-in">
                                <div className="p-5 rounded-2xl bg-white border-2 border-latte-100 flex flex-col gap-2 relative overflow-hidden">
                                    <div className="text-[11px] font-bold text-latte-500 uppercase tracking-widest">실제 정답</div>
                                    <div className="text-2xl font-black text-gray-800">{currentQ.answer}</div>
                                    
                                    <div className="mt-3 pt-3 border-t border-gray-100">
                                        <div className="text-[11px] font-bold text-gray-400 mb-1">내가 적은 답</div>
                                        <div className={`text-base font-bold ${isExactMatch ? 'text-green-500' : 'text-red-400'}`}>
                                            {userInput || '(미입력)'}
                                        </div>
                                    </div>
                                    
                                    {isExactMatch && (
                                        <div className="absolute top-4 right-4 text-green-500 bg-green-50 p-2 rounded-full">
                                            <CheckIcon />
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-3 mt-6">
                                    <button 
                                        onClick={() => handleResult(false)}
                                        className="flex-1 py-3.5 rounded-2xl bg-white border border-red-200 text-red-500 font-bold text-sm hover:bg-red-50 transition-colors flex items-center justify-center gap-1.5"
                                    >
                                        <XIcon /> 다시 학습
                                    </button>
                                    <button 
                                        onClick={() => handleResult(true)}
                                        className="flex-1 py-3.5 rounded-2xl bg-[#849F71] text-white font-bold text-sm hover:bg-[#738C62] transition-colors flex items-center justify-center gap-1.5 shadow-sm"
                                    >
                                        <CheckIcon /> 통과
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    /* ══════ 화면 3: 결과 미니 대시보드 ══════ */
    if (appState === 'result') {
        const passCount = Object.values(results).filter(Boolean).length;
        const scorePct = Math.round((passCount / testQueue.length) * 100);
        
        // 이 세션 이후에 밀린 복습이 남아있는지 확인
        const remainingPending = pendingQuestions.filter(q => !testQueue.find(tq => tq.id === q.id));

        return (
            <div className="w-full max-w-[420px] bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] flex flex-col max-h-[90vh] min-h-[580px] soft-shadow overflow-hidden">
                <div className="p-8 pb-4 text-center">
                    <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-latte-50 text-latte-500 mb-4">
                        {scorePct === 100 ? '🎉' : <SmileIcon />}
                    </div>
                    <h2 className="text-2xl font-bold text-gray-800 mb-1">수고하셨습니다!</h2>
                    <p className="text-sm text-gray-500">방금 진행한 결과를 요약해 드릴게요.</p>
                </div>

                <div className="px-8 pb-6 border-b border-[#EBE8DE]">
                    <div className="flex bg-white rounded-2xl border border-[#EBE8DE] p-4 divide-x divide-[#EBE8DE]">
                        <div className="flex-1 flex flex-col items-center">
                            <span className="text-[11px] font-bold text-gray-400 mb-1">진행한 문제</span>
                            <span className="text-lg font-extrabold text-gray-800">{testQueue.length}</span>
                        </div>
                        <div className="flex-1 flex flex-col items-center">
                            <span className="text-[11px] font-bold text-[#849F71] mb-1">통과</span>
                            <span className="text-lg font-extrabold text-[#849F71]">{passCount}</span>
                        </div>
                        <div className="flex-1 flex flex-col items-center">
                            <span className="text-[11px] font-bold text-red-400 mb-1">다시 학습</span>
                            <span className="text-lg font-extrabold text-red-400">{testQueue.length - passCount}</span>
                        </div>
                    </div>
                </div>

                <div className="flex-1 overflow-y-auto p-8 pt-6">
                    <h3 className="text-[11px] font-bold text-gray-400 mb-3 tracking-wide">문항별 상세 결과</h3>
                    <div className="space-y-2.5">
                        {testQueue.map((q) => {
                            const isPass = results[q.id];
                            return (
                                <div key={q.id} className="bg-white p-3.5 rounded-2xl border border-[#EBE8DE] flex items-center gap-3">
                                    <div className={`w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 ${isPass ? 'bg-green-50 text-green-500' : 'bg-red-50 text-red-400'}`}>
                                        {isPass ? <CheckIcon/> : <XIcon/>}
                                    </div>
                                    <div className="flex-1 min-w-0">
                                        <div className="text-[11px] text-latte-500 font-bold truncate">{q.answer}</div>
                                        <div className="text-xs font-medium text-gray-800 truncate">{q.summary}</div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>

                <div className="p-6 pt-0 flex flex-col gap-3">
                    {/* 세션 타입이 pending이었고, 아직 pending이 남았다면 이어서 풀기 유도 */}
                    {sessionType === 'pending' && remainingPending.length > 0 && (
                        <button 
                            onClick={() => {
                                setAppState('ready');
                            }}
                            className="w-full py-4 rounded-2xl bg-latte-50 text-latte-700 font-bold text-sm transition-colors border border-latte-100 flex items-center justify-center gap-2"
                        >
                            <ZapIcon /> 아직 남은 {remainingPending.length}개 이어서 하기
                        </button>
                    )}
                    
                    <button 
                        onClick={() => {
                            setAppState('ready');
                        }}
                        className="w-full py-4 rounded-2xl bg-latte-500 text-white font-bold text-sm hover:bg-latte-700 transition-colors shadow-sm text-center"
                    >
                        홈으로 돌아가기
                    </button>
                </div>
            </div>
        );
    }

    return null;
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
