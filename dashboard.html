/* ── 유틸 ── */
const fmtMinToHour = (min) => {
    const h = Math.floor(min / 60); const m = Math.floor(min % 60);
    if (h === 0) return `${m}분`;
    if (m === 0) return `${h}시간`;
    return `${h}시간 ${m}분`;
};
const normalizeDate = (d) => { const nd = new Date(d); nd.setHours(0,0,0,0); return nd.getTime(); };
const getDayKOR = (idx) => ['일', '월', '화', '수', '목', '금', '토'][idx];
const formatKORDate = (d) => `${d.getMonth()+1}월 ${d.getDate()}일 ${getDayKOR(d.getDay())}`;
const formatKORDateShort = (dNum) => {
    const d = new Date(parseInt(dNum));
    const day = ['일', '월', '화', '수', '목', '금', '토'][d.getDay()];
    return `${d.getMonth()+1}월 ${d.getDate()}일 (${day})`;
};


const extractNotionId = (value) => {
    const raw = (value || '').trim();
    if (!raw) return '';
    const matches = raw.match(/[0-9a-fA-F]{32}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/g);
    if (matches && matches.length > 0) return matches[matches.length - 1].replace(/-/g, '');
    return raw.replace(/-/g, '');
};

// ── 데이터 파싱: 복수 하위항목 판별 및 중복 상위항목 정리 ──
const extractSubjectInfoList = (props, subjectMap) => {
    let targetKey = Object.keys(props).find(k => k === '과목') 
        || Object.keys(props).find(k => k.includes('과목'))
        || Object.keys(props).find(k => props[k].type === 'relation')
        || Object.keys(props).find(k => props[k].type === 'rollup');
        
    if (!targetKey || !props[targetKey]) return [];
    
    const p = props[targetKey];
    const results = [];

    if (p.type === 'relation' && p.relation?.length > 0) {
        p.relation.forEach(rel => {
            const subj = subjectMap[rel.id];
            if (subj) results.push({ name: subj.name, parentName: subj.parentName });
        });
    } else if (p.type === 'rollup' && p.rollup?.array) {
        for (const item of p.rollup.array) {
            if (item.type === 'relation' && item.relation?.length > 0) {
                item.relation.forEach(rel => {
                    const subj = subjectMap[rel.id];
                    if (subj) results.push({ name: subj.name, parentName: subj.parentName });
                });
            } else if (item.type === 'title' && item.title?.length > 0) {
                results.push({ name: item.title[0].plain_text, parentName: null });
            } else if (item.type === 'rich_text' && item.rich_text?.length > 0) {
                results.push({ name: item.rich_text[0].plain_text, parentName: null });
            }
        }
    }

    if (results.length === 0) return [{ name: '기타', parentName: null }];

    const unique = [];
    const seen = new Set();
    for (const r of results) {
        if (!seen.has(r.name)) {
            seen.add(r.name);
            unique.push(r);
        }
    }

    const parentNamesInList = new Set(unique.map(r => r.parentName).filter(Boolean));
    const filtered = unique.filter(r => !parentNamesInList.has(r.name));

    return filtered.length > 0 ? filtered : [{ name: '기타', parentName: null }];
};

const extractSubjectInfo = (props, subjectMap) => {
    return extractSubjectInfoList(props, subjectMap)[0] || { name: '기타', parentName: null };
};

const loadConfigFromURL = () => {
    try {
        const params = new URLSearchParams(window.location.search);
        const proxyUrl = params.get('proxy') || params.get('proxyUrl') || '';
        const apiKey = params.get('key') || params.get('apiKey') || '';
        const recordDbId = params.get('record') || params.get('recordDbId') || '';
        const subjectDbId = params.get('subject') || params.get('subjectDbId') || '';
        const todoDbId = params.get('todo') || params.get('todoDbId') || '';
        const statsDbId = params.get('stats') || params.get('statsDbId') || '';
        const noteDbId = params.get('note') || params.get('noteDbId') || '';
        const wrongDbId = params.get('wrong') || params.get('wrongDbId') || '';
        const vocabDbId = params.get('vocab') || params.get('vocabDbId') || '';
        const testDbId  = params.get('test')  || params.get('testDbId')  || '';
        const dashboardPageId = extractNotionId(params.get('dashboardPageId') || params.get('statPageId') || params.get('dashboardPageUrl') || '');
        const dashboardRelationProp = params.get('dashboardRelationProp') || '대시보드 통계용';
        if (proxyUrl && apiKey && recordDbId) {
            return { proxyUrl, apiKey, recordDbId, subjectDbId, todoDbId, statsDbId, noteDbId, wrongDbId, vocabDbId, testDbId, dashboardPageId, dashboardRelationProp, saved: true };
        }
    } catch {}
    return null;
};

const safeStorage = {
    get: (key) => {
        try { return JSON.parse(localStorage.getItem(key)) || null; } catch {}
        try { return JSON.parse(sessionStorage.getItem(key)) || null; } catch {}
        return null;
    },
    set: (key, val) => {
        const str = JSON.stringify(val);
        try { localStorage.setItem(key, str); return; } catch {}
        try { sessionStorage.setItem(key, str); } catch {}
    }
};

const loadConfig = () => {
    const urlConfig = loadConfigFromURL();
    if (urlConfig) return urlConfig;
    return safeStorage.get(LS_CONFIG) || {};
};

    const [showOverdueModal, setShowOverdueModal] = useState(false);
    const [linkNoteModal, setLinkNoteModal] = useState({ isOpen: false, vocab: null, type: 'note' });
    const [viewNotesModal, setViewNotesModal] = useState({ isOpen: false, vocab: null, type: 'note', notes: [] });
    const [linkSearchTerm, setLinkSearchTerm] = useState('');
    const dateInputRef = useRef(null);

    const [toast, setToast] = useState({ message: '', visible: false, type: 'success' });
    const toastTimerRef = useRef(null);

    const showToast = useCallback((message, type = 'success') => {
        setToast({ message, visible: true, type });
        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
        toastTimerRef.current = setTimeout(() => {
            setToast(prev => ({ ...prev, visible: false }));
        }, 3000);
    }, []);

    const dashboardPageIdCacheRef = useRef(null);

    const getDashboardPageId = useCallback(async (currentConfig = config) => {
        const directId = extractNotionId(currentConfig.dashboardPageId || currentConfig.statPageId || currentConfig.dashboardPageUrl || '');
        if (directId) return directId;
        if (dashboardPageIdCacheRef.current) return dashboardPageIdCacheRef.current;
        if (!currentConfig.saved || !currentConfig.statsDbId) return '';

        try {
            const statsRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.statsDbId}/query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                body: JSON.stringify({ page_size: 1 })
            });
            if (!statsRes.ok) return '';
            const statsJson = await statsRes.json();
            const firstPageId = statsJson.results?.[0]?.id || '';
            if (firstPageId) dashboardPageIdCacheRef.current = firstPageId;
            return firstPageId;
        } catch (e) {
            console.warn('대시보드 통계용 페이지 ID 확인 실패:', e);
            return '';
        }
    }, [config]);

    const openSettings = useCallback(() => {
        setSetupForm({
            proxyUrl:    config.proxyUrl    || '',
            apiKey:      config.apiKey      || '',
            recordDbId:  config.recordDbId  || '',
            subjectDbId: config.subjectDbId || '',
            todoDbId:    config.todoDbId    || '',
            statsDbId:   config.statsDbId   || '',
            noteDbId:    config.noteDbId    || '',
            wrongDbId:   config.wrongDbId   || '',
            vocabDbId:   config.vocabDbId   || '',
            testDbId:    config.testDbId    || '',
            dashboardPageId: config.dashboardPageId || config.statPageId || '',
            dashboardRelationProp: config.dashboardRelationProp || '대시보드 통계용',
        });
        setSetupError('');
        setShowSetup(true);
    }, [config]);

    const handleSetupSave = async () => {
        const { proxyUrl, apiKey, recordDbId } = setupForm;
        if (!proxyUrl || !apiKey || !recordDbId) {
            setSetupError('필수 항목(Proxy, API Key, 기록 DB)을 입력해주세요.'); return;
        }
        setSetupLoading(true); setSetupError('');
        try {
            const testRes = await fetch(`${proxyUrl}/v1/databases/${recordDbId}/query`, {
                method: 'POST',
                headers: { 'Content-Type':'application/json', 'x-api-key':apiKey, 'x-notion-version':'2022-06-28' },
                body: JSON.stringify({ page_size: 1 }),
            });
            if (!testRes.ok) throw new Error('연결 실패 — 설정을 확인해주세요');
            
            const newConfig = { ...setupForm, saved: true };
            setConfig(newConfig);
            safeStorage.set(LS_CONFIG, newConfig);
            setShowSetup(false);
            fetchData(newConfig);
        } catch (e) {
            setSetupError(e.message);
        } finally {
            setSetupLoading(false);
        }
    };

    /* ── 데이터 페칭 ── */
    const fetchData = useCallback(async (currentConfig = config) => {
        if (!currentConfig.saved) { setLoading(false); return; }
        setLoading(true);
        
        try {
            const subjectMap = {};
            const subjList = [];
            if (currentConfig.subjectDbId) {
                const subjRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.subjectDbId}/query`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' }, body: JSON.stringify({ page_size: 100 })
                });
                if (subjRes.ok) {
                    const subjData = await subjRes.json();
                    subjData.results.forEach(p => {
                        const nameProp = Object.values(p.properties).find(prop => prop.type === 'title');
                        const name = nameProp?.title?.[0]?.plain_text || '미선택';
                        
                        const iconRaw = p.icon;
                        let icon = null;
                        
                        if (iconRaw) {
                            if (iconRaw.type === 'emoji') {
                                icon = { type: 'emoji', value: iconRaw.emoji };
                            } else if (iconRaw.type === 'external' && iconRaw.external) {
                                icon = { type: 'img', value: iconRaw.external.url };
                            } else if (iconRaw.type === 'file' && iconRaw.file) {
                                icon = { type: 'img', value: iconRaw.file.url };
                            } else if (iconRaw.type === 'custom_emoji' && iconRaw.custom_emoji) {
                                icon = { type: 'img', value: iconRaw.custom_emoji.url };
                            } else if (iconRaw.type === 'icon' && iconRaw.icon) {
                                const iconName = iconRaw.icon.name;
                                const iconColor = iconRaw.icon.color || 'gray';
                                icon = { type: 'img', value: `https://www.notion.so/icons/${iconName}_${iconColor}.svg` };
                            }
                        }
                        
                        let parentId = null;
                        const parentProp = p.properties['상위 항목'] || Object.values(p.properties).find(prop => prop.type === 'relation' && prop.name && prop.name.includes('상위'));
                        if (parentProp && parentProp.relation && parentProp.relation.length > 0) {
                            parentId = parentProp.relation[0].id;
                        }

                        subjectMap[p.id] = { id: p.id, name, icon, parentId };
                    });

                    Object.values(subjectMap).forEach(s => {
                        if (s.parentId && subjectMap[s.parentId]) {
                            s.parentName = subjectMap[s.parentId].name;
                        }
                        subjList.push(s);
                    });
                    
                    setSubjects(subjList);
                }
            }

            const recRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.recordDbId}/query`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                body: JSON.stringify({ sorts: [{ property: '날짜', direction: 'descending' }], page_size: 500 })
            });
            const recData = await recRes.json();
            const parsedRecords = recData.results.map(page => {
                const subjInfo = extractSubjectInfo(page.properties, subjectMap);
                
                const minutes = page.properties['순공시간']?.number || 0;
                const startIso = page.properties['날짜']?.date?.start || page.created_time;
                const modeName = page.properties['모드']?.select?.name || '';
                const coffeeType = page.properties['커피 종류']?.select?.name || null;
                
                return { subject: subjInfo.name, subjectParent: subjInfo.parentName, minutes, date: normalizeDate(startIso), hour: new Date(startIso).getHours(), mode: modeName.includes('뽀모도로') ? 'pomodoro' : 'normal', coffeeType };
            });
            setRecords(parsedRecords);

            if (currentConfig.todoDbId) {                
                const todoRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.todoDbId}/query`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                    body: JSON.stringify({ sorts: [{ property: '날짜', direction: 'descending' }], page_size: 100 })
                });
                if (todoRes.ok) {
                    const todoData = await todoRes.json();
                    
                    let tKey = '이름', cKey = '완료', dKey = '날짜', sKey = '과목';
                    if (todoData.results.length > 0) {
                        const props = todoData.results[0].properties;
                        tKey = Object.keys(props).find(k => props[k].type === 'title') || tKey;
                        cKey = Object.keys(props).find(k => props[k].type === 'checkbox') || cKey;
                        dKey = Object.keys(props).find(k => props[k].type === 'date') || dKey;
                        
                        if (props['과목'] && props['과목'].type === 'relation') {
                            sKey = '과목';
                        } else {
                            sKey = Object.keys(props).find(k => k.includes('과목') && props[k].type === 'relation') 
                                || Object.keys(props).find(k => props[k].type === 'relation') 
                                || '과목'; 
                        }
                        
                        setTodoProps({ title: tKey, done: cKey, date: dKey, subject: sKey });
                    }

                    const parsedTodos = todoData.results.map(page => {
                        const title = page.properties[tKey]?.title?.[0]?.plain_text || '내용 없음';
                        const done = page.properties[cKey]?.checkbox || false;
                        const dateIso = page.properties[dKey]?.date?.start || page.created_time;
                        
                        const rel = page.properties[sKey]?.relation;
                        const subjectId = rel && rel.length > 0 ? rel[0].id : null;
                        
                        let subjectName = '과목 없음';
                        let subjectParent = null;
                        if (subjectId && subjectMap[subjectId]) {
                            subjectName = subjectMap[subjectId].name;
                            subjectParent = subjectMap[subjectId].parentName;
                        }

                        let timeStr = null;
                        let timeSortValue = 9999; 

                        const timeField = page.properties['시간'];
                        let timeRaw = null;
                        if (timeField) {
                            if (timeField.type === 'number') timeRaw = timeField.number;
                            else if (timeField.type === 'rich_text' && timeField.rich_text.length > 0) timeRaw = parseInt(timeField.rich_text[0].plain_text, 10);
                            else if (timeField.type === 'title' && timeField.title.length > 0) timeRaw = parseInt(timeField.title[0].plain_text, 10);
                        }

                        if (timeRaw !== null && !isNaN(timeRaw)) {
                            let h = 0, m = 0;
                            if (timeRaw < 24) { h = timeRaw; m = 0; } 
                            else { h = Math.floor(timeRaw / 100); m = timeRaw % 100; }
                            timeStr = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
                            timeSortValue = h * 60 + m;
                        } 
                        else if (page.properties[dKey]?.date?.start?.includes('T')) {
                            const d = new Date(dateIso);
                            timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                            timeSortValue = d.getHours() * 60 + d.getMinutes();
                        }

                        return { id: page.id, title, done, date: normalizeDate(dateIso), timeStr, timeSortValue, subjectId, subjectName, subjectParent };
                    });
                    setTodos(parsedTodos);
                }
            }

            if (currentConfig.statsDbId) {
                try {
                    const statsRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.statsDbId}/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                        body: JSON.stringify({ page_size: 1 })
                    });
                    if (statsRes.ok) {
                        const statsJson = await statsRes.json();
                        if (statsJson.results && statsJson.results.length > 0) {
                            const props = statsJson.results[0].properties;
                            const getNum = (...keys) => {
                                for (const k of keys) {
                                    if (props[k]?.type === 'number' && props[k].number !== null) return props[k].number;
                                    if (props[k]?.type === 'formula' && props[k].formula?.number !== null) return props[k].formula?.number;
                                    if (props[k]?.type === 'rollup' && props[k].rollup?.number !== null) return props[k].rollup?.number;
                                }
                                return null;
                            };
                            setStatsData({
                                notes:      getNum('학습노트 총 개수'),
                                resources:  getNum('자료실 총 개수'),
                                doneTodos:  getNum('완료한 투두 총 개수'),
                                studyHours: getNum('총 공부 시간'),
                                subjects:   getNum('과목 총 개수'),
                            });
                        }
                    }
                } catch (e) { console.warn('통계 DB 로드 실패:', e); }
            }

            if (currentConfig.noteDbId) {
                try {
                    const noteRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.noteDbId}/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                        body: JSON.stringify({ sorts: [{ timestamp: 'created_time', direction: 'descending' }], page_size: 200 })
                    });
                    if (noteRes.ok) {
                        const noteJson = await noteRes.json();
                        const parsedNotes = noteJson.results.map(p => {
                            const titleProp = Object.values(p.properties).find(pr => pr.type === 'title');
                            const title = titleProp?.title?.[0]?.plain_text || '제목 없음';
                            const subjectsList = extractSubjectInfoList(p.properties, subjectMap);
                            const relatedIds = new Set();
                            Object.values(p.properties).forEach(pr => {
                                if (pr.type === 'relation') pr.relation?.forEach(r => relatedIds.add(r.id));
                            });
                            return { id: p.id, title, createdTime: p.created_time, subjects: subjectsList, relatedIds };
                        });
                        setNotes(parsedNotes);
                    }
                } catch (e) { console.warn('학습 노트 DB 로드 실패:', e); }
            }

            if (currentConfig.wrongDbId) {
                try {
                    const wrongRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.wrongDbId}/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                        body: JSON.stringify({ sorts: [{ timestamp: 'created_time', direction: 'descending' }], page_size: 200 })
                    });
                    if (wrongRes.ok) {
                        const wrongJson = await wrongRes.json();
                        const parsedWrongs = wrongJson.results.map(p => {
                            const titleProp = Object.values(p.properties).find(pr => pr.type === 'title');
                            const title = titleProp?.title?.[0]?.plain_text || '제목 없음';
                            const subjectsList = extractSubjectInfoList(p.properties, subjectMap);
                            const relatedIds = new Set();
                            Object.values(p.properties).forEach(pr => {
                                if (pr.type === 'relation') pr.relation?.forEach(r => relatedIds.add(r.id));
                            });
                            return { id: p.id, title, createdTime: p.created_time, subjects: subjectsList, relatedIds };
                        });
                        setWrongs(parsedWrongs);
                    }
                } catch (e) { console.warn('오답 노트 DB 로드 실패:', e); }
            }

            if (currentConfig.vocabDbId && currentConfig.testDbId) {
                const getLocalYMD = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                const todayYMD = getLocalYMD(new Date());
                const weekAgoYMD = getLocalYMD(new Date(Date.now() - 7 * 86400000));

                let allTestResults = []; let hasMore = true, cursor = undefined;
                while (hasMore && allTestResults.length < 1000) {
                    const res = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.testDbId}/query`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                        body: JSON.stringify({ page_size: 100, ...(cursor && {start_cursor: cursor}) })
                    });
                    if (!res.ok) break; const json = await res.json();
                    allTestResults = allTestResults.concat(json.results || []); hasMore = json.has_more; cursor = json.next_cursor;
                }

                const vocabRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.vocabDbId}/query`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                    body: JSON.stringify({ filter: { property: '누적 통과 횟수', number: { greater_than_or_equal_to: 4 } }, sorts: [{ timestamp: 'created_time', direction: 'descending' }], page_size: 100 })
                });

                const extractText = (prop) => {
                    if (!prop) return null; if (prop.title?.length) return prop.title[0].plain_text; if (prop.rich_text?.length) return prop.rich_text[0].plain_text;
                    if (prop.rollup?.array?.length) return prop.rollup.array[0].title?.[0]?.plain_text || prop.rollup.array[0].rich_text?.[0]?.plain_text;
                    return null;
                };

                const testItemMap = {};
                const vocabIdToTestIdMap = {}; // ID 기반 매칭을 위한 맵
                const todayAdded = [], recentWords = [], reviewList = [];
                const subjectCounts = {};

                allTestResults.forEach(page => {
                    const props = page.properties;
                    const answer = extractText(props['정답']) || '';
                    if (!answer.trim()) return;
                    
                    testItemMap[answer] = page.id;

                    const passCount = props['누적 통과 횟수']?.number || 0;
                    const isRetry   = props['다시 학습']?.checkbox === true;
                    const createdTime = page.created_time;
                    const createdYMD = getLocalYMD(new Date(createdTime));
                    const isAddedToday = createdYMD === todayYMD;

                    let status = 'pending';
                    if (passCount > 0) status = 'passed';
                    if (isRetry) status = 'failed';

                    const subjNames = (props['과목']?.relation || []).map(r => subjectMap[r.id]?.name).filter(Boolean);
                    if (subjNames.length > 0) subjNames.forEach(s => { subjectCounts[s] = (subjectCounts[s]||0)+1; });

                    const testRelatedIds = new Set();
                    Object.values(props).forEach(pr => {
                        if (pr.type === 'relation') {
                            pr.relation?.forEach(r => {
                                testRelatedIds.add(r.id);
                                vocabIdToTestIdMap[r.id] = page.id; // 단어장 ID와 테스트 ID 연결
                            });
                        }
                    });

                    const item = { id: page.id, title: answer, passCount, subjects: subjNames, createdTime, status, testPageId: page.id, relatedIds: testRelatedIds };

                    if (isAddedToday) {
                        todayAdded.push(item);
                    } else if (createdYMD >= weekAgoYMD) {
                        recentWords.push(item);
                    }

                    if (passCount < 4) {
                        reviewList.push(item);
                    }
                });

                const vocabPageRelMap = {};
                let allVocabPages = [], hasMoreVocab = true, vocabCursor = undefined;
                while (hasMoreVocab && allVocabPages.length < 2000) {
                    const vRes = await fetch(`${currentConfig.proxyUrl}/v1/databases/${currentConfig.vocabDbId}/query`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json', 'x-api-key': currentConfig.apiKey, 'x-notion-version': '2022-06-28' },
                        body: JSON.stringify({ page_size: 100, ...(vocabCursor && {start_cursor: vocabCursor}) })
                    });
                    if (!vRes.ok) break;
                    const vJson = await vRes.json();
                    allVocabPages = allVocabPages.concat(vJson.results || []);
                    hasMoreVocab = vJson.has_more; vocabCursor = vJson.next_cursor;
                }
                
                // ID로도 찾을 수 있도록 맵핑 보강
                allVocabPages.forEach(page => {
                    const titleProp = Object.values(page.properties).find(p => p.type === 'title');
                    const title = titleProp?.title?.[0]?.plain_text || '';
                    if (!title) return;
                    const relIds = new Set();
                    Object.values(page.properties).forEach(pr => {
                        if (pr.type === 'relation') pr.relation?.forEach(r => relIds.add(r.id));
                    });
                    vocabPageRelMap[title] = { vocabPageId: page.id, relatedIds: relIds };
                    vocabPageRelMap[page.id] = { vocabPageId: page.id, relatedIds: relIds }; // ID 매핑 추가
                });

                // Relation ID를 통해 우선적으로 매칭
                reviewList.forEach(item => {
                    let vocabInfo = null;
                    
                    if (item.relatedIds) {
                        for (const rId of item.relatedIds) {
                            if (vocabPageRelMap[rId]) {
                                vocabInfo = vocabPageRelMap[rId];
                                break;
                            }
                        }
                    }
                    
                    if (!vocabInfo) {
                        vocabInfo = vocabPageRelMap[item.title];
                    }

                    if (vocabInfo) {
                        item.vocabPageId = vocabInfo.vocabPageId;
                        item.vocabRelatedIds = vocabInfo.relatedIds;
                    }
                });

                let masters = [];
                if (vocabRes.ok) {
                    const vocabJson = await vocabRes.json();
                    masters = vocabJson.results.map(page => {
                        const title = extractText(Object.values(page.properties).find(p => p.type === 'title')) || '제목 없음';
                        const passCount  = page.properties['누적 통과 횟수']?.rollup?.number ?? 4;
                        const subjNames  = (page.properties['과목']?.relation || []).map(r => subjectMap[r.id]?.name).filter(Boolean);
                        
                        // 문자열 대신 ID를 우선적으로 사용하여 테스트 페이지 찾기
                        const mappedTestPageId = vocabIdToTestIdMap[page.id] || testItemMap[title];
                        
                        return { id: page.id, title, passCount, subjects: subjNames, createdTime: page.created_time, testPageId: mappedTestPageId };
                    });
                }

                setVocabData({ todayAdded, recentWords, reviewList, masters, subjectCounts });
            }

        } catch (e) { console.error(e); } finally { setLoading(false); }
    }, [config]);

    useEffect(() => { if(!showSetup) fetchData(); }, [fetchData, showSetup]);

    /* ── 단어 뜻/설명 모달 호출 및 데이터 Fetch (Caching) ── */
    const openVocabDetail = async (word) => {
        setVocabDetailModal({ isOpen: true, word });
        setVocabDetailTab('explanation');
        
        // 단어장 DB 페이지 ID를 우선시, 없으면 테스트 페이지 ID
        const targetId = word.vocabPageId || word.id;
        
        if (cachedExplanations[targetId]) return; // 이미 캐싱된 데이터가 있으면 API 호출 생략
        
        // 로딩 상태 시작
        setCachedExplanations(prev => ({ ...prev, [targetId]: { isLoading: true, text: null, error: null } }));
        
        try {
            // 1. 단어장(또는 테스트) 페이지의 Property에서 뜻/설명 찾기 시도
            const pageRes = await fetch(`${config.proxyUrl}/v1/pages/${targetId}`, {
                method: 'GET',
                headers: { 'x-api-key': config.apiKey, 'x-notion-version': '2022-06-28' }
            });
            if (!pageRes.ok) throw new Error('페이지 정보를 불러올 수 없습니다.');
            const pageData = await pageRes.json();
            
            let explanationText = '';
            const props = pageData.properties;
            
            // 뜻, 의미, 설명, 정의 등의 이름을 가진 속성(텍스트 타입) 찾기
            const targetPropKey = Object.keys(props).find(k => 
                k.includes('뜻') || k.includes('의미') || k.includes('설명') || k.includes('정의')
            );
            
            if (targetPropKey && (props[targetPropKey].type === 'rich_text' || props[targetPropKey].type === 'title')) {
                const richTextArr = props[targetPropKey][props[targetPropKey].type];
                explanationText = richTextArr.map(t => t.plain_text).join('\n');
            }
            
            // 2. Property에 뜻이 없다면 본문(블록 자식들) 내용 가져오기 시도
            if (!explanationText.trim()) {

    const streakData = useMemo(() => {
        if (!records.length) return { current: 0, max: 0 };
        const daysMap = {}; records.forEach(r => { if(r.minutes > 0) daysMap[r.date] = true; });

        let current = 0;
        const startOffset = daysMap[todayNum] ? 0 : 1;
        for (let i = startOffset; i < 365; i++) {
            const d = todayNum - i * 86400000;
            if (daysMap[d]) current++;
            else break;
        }

        let max = 0, tempStreak = 0;
        for (let i = 0; i < 365; i++) {
            const d = todayNum - i * 86400000;
            if (daysMap[d]) { tempStreak++; if (tempStreak > max) max = tempStreak; }
            else tempStreak = 0;
        }

        return { current, max };
    }, [records, todayNum]);

    const weeklyStamps = useMemo(() => {
        const todayObj = new Date();
        const dayOfWeek = todayObj.getDay() === 0 ? 6 : todayObj.getDay() - 1;
        const startOfWeek = todayNum - (dayOfWeek * 86400000);
        const stamps = []; let stampCount = 0;
        for (let i = 0; i < 7; i++) {
            const d = startOfWeek + (i * 86400000);
            const hasRecord = records.some(r => r.date === d && r.minutes > 0);
            if (hasRecord) stampCount++;
            stamps.push({ dayIdx: i, hasRecord, isFuture: d > todayNum, isToday: d === todayNum });
        }
        return { stamps, stampCount };
    }, [records, todayNum]);

    const monthFootprint = useMemo(() => {
        const now = new Date();
        const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const lastDate = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const cells = [];
        for (let i = 0; i < firstDay; i++) cells.push({ empty: true });
        for (let i = 1; i <= lastDate; i++) {
            const dTime = new Date(now.getFullYear(), now.getMonth(), i).getTime();
            if (dTime > todayNum) { cells.push({ empty: true }); continue; }
            const mins = records.filter(r => r.date === dTime).reduce((a,b)=>a+b.minutes, 0);
            let level = 0;
            if (mins > 0) level = 1; if (mins >= 30) level = 2; if (mins >= 60) level = 3; if (mins >= 120) level = 4;
            cells.push({ date: i, level, mins });
        }
        return cells;

        const days = [];
        for (let i = 0; i < firstDay; i++) days.push({ empty: true, key: `e${i}` });
        for (let i = 1; i <= lastDate; i++) {
            const dTime = new Date(year, month, i).getTime();

            const hasTodo = todos.some(t => t.date === dTime);
            const coffeeCount = {};
            dayRecords.forEach(r => { if (r.coffeeType) coffeeCount[r.coffeeType] = (coffeeCount[r.coffeeType] || 0) + 1; });
            const coffeeType = Object.entries(coffeeCount).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
            days.push({ date: i, isToday: dTime === todayNum, isSelected: dTime === selectedDate, hasRecord, hasTodo, time: dTime, coffeeType });

    /* ── 데이터 가공 (RECORDS 뷰) ── */
    const recordStats = useMemo(() => {
        if (!records.length) return { topSubj: '-', topTime: '-', preferredMode: '-', preferredPct: 0 };
        const weekAgo = todayNum - 6 * 86400000;
        const weekRecords = records.filter(r => r.date >= weekAgo);
        const subjMap = {}; weekRecords.forEach(r => subjMap[r.subject] = (subjMap[r.subject] || 0) + r.minutes);
        const sortedSubj = Object.entries(subjMap).sort((a,b)=>b[1]-a[1]);
        
        const times = { '새벽':0, '오전':0, '오후':0, '저녁':0 };
        records.forEach(r => {
            if (r.hour >= 0 && r.hour < 6) times['새벽'] += r.minutes;
            else if (r.hour >= 6 && r.hour < 12) times['오전'] += r.minutes;
            else if (r.hour >= 12 && r.hour < 18) times['오후'] += r.minutes;
            else times['저녁'] += r.minutes;
        });
        const topTime = Object.entries(times).sort((a,b)=>b[1]-a[1])[0];

        let pomo = 0, norm = 0;
        records.forEach(r => { if(r.mode === 'pomodoro') pomo += r.minutes; else norm += r.minutes; });
        const total = pomo + norm;

        return {
            topSubj: sortedSubj.length > 0 ? sortedSubj[0][0] : '-',
            topTime: topTime[1] > 0 ? `${topTime[0]}형` : '-',
            preferredMode: total === 0 ? '-' : (norm > pomo ? '일반' : '뽀모도로'),
            preferredPct: total === 0 ? 0 : Math.round((Math.max(norm, pomo) / total) * 100)
        };
    }, [records, todayNum]);

    const barChartData = useMemo(() => {
        const sums = {};
        records.forEach(r => { sums[r.subject] = (sums[r.subject] || 0) + r.minutes; });
        const sortedAllSubjects = Object.keys(sums).sort((a, b) => sums[b] - sums[a]);
        
        const getSubjectColor = (subj) => {
            const idx = sortedAllSubjects.indexOf(subj);
            return CHART_COLORS[idx !== -1 ? (idx % CHART_COLORS.length) : 0];
        };

        const days = []; let max = 1;
        for (let i = 6; i >= 0; i--) {
            const dTime = todayNum - (i * 86400000);
            const dayRecords = records.filter(r => r.date === dTime);
            const total = dayRecords.reduce((a, r) => a + r.minutes, 0);
            if (total > max) max = total;
            
            const subjMap = {};
            dayRecords.forEach(r => {
                subjMap[r.subject] = (subjMap[r.subject] || 0) + r.minutes;
            });
            
            const subjects = Object.entries(subjMap).map(([name, min]) => ({
                name,
                min,
                color: getSubjectColor(name)
            })).sort((a, b) => b.min - a.min);

            days.push({ label: getDayKOR(new Date(dTime).getDay()), total, isToday: i === 0, subjects });
        }
        return { days, max, totalSum: days.reduce((a,b)=>a+b.total, 0) };
    }, [records, todayNum]);

    const donutChartData = useMemo(() => {
        const sums = {}; let total = 0;
        records.forEach(r => { sums[r.subject] = (sums[r.subject] || 0) + r.minutes; total += r.minutes; });
        const list = Object.entries(sums).map(([name, min]) => ({ name, min, percent: total > 0 ? (min/total)*100 : 0 })).sort((a, b) => b.min - a.min);
        return { list, total };
    }, [records]);

    const [donutChartType, setDonutChartType] = useState('donut'); 

    const yearlyGrass = useMemo(() => {
        const now = new Date(); const year = now.getFullYear(); const jan1 = new Date(year, 0, 1);
        const startOffset = jan1.getDay(); const isLeap = (year % 4 === 0 && year % 100 !== 0) || year % 400 === 0;
        const totalDays = isLeap ? 366 : 365;
        const cells = [];
        for (let i = 0; i < startOffset; i++) cells.push({ empty: true });

        for (let d = 0; d < totalDays; d++) {
            const date = new Date(year, 0, d + 1); const dTime = normalizeDate(date);
            const month = date.getMonth() + 1; const day = date.getDate();
            if (dTime > todayNum) { cells.push({ empty: true, month, day }); continue; }

            const mins = records.filter(r => r.date === dTime).reduce((a, b) => a + b.minutes, 0);
            let level = 0; if (mins > 0) level = 1; if (mins >= 30) level = 2; if (mins >= 60) level = 3; if (mins >= 120) level = 4;
            cells.push({ dTime, mins, level, month, day, isToday: dTime === todayNum });
        }
        const totalCols = Math.ceil(cells.length / 7);
        return { cells, totalCols };
    }, [records, todayNum]);

        const now = new Date(); const year = now.getFullYear(); const months = [];

            const total = isFuture ? 0 : records.filter(r => { const d = new Date(r.date); return d.getFullYear() === year && d.getMonth() === m; }).reduce((a, b) => a + b.minutes, 0);
            months.push({ label, total, isFuture, isCurrent: m === now.getMonth() });

        const max = Math.max(...months.map(m => m.total), 1);
        return { months, max };
    }, [records]);

            if (studyLogFilter === 'week') return d >= weekStart && d <= todayStart;
            if (studyLogFilter === 'month') return d >= monthStart && d <= todayStart;
            if (studyLogFilter === 'year') return d >= yearStart && d <= todayStart;

            records: records.filter(r => filterFn(r, r => r.date)),
            notes: notes.filter(n => filterFn(n, n => n.createdTime)),

                                <button onClick={() => setVocabDetailTab('wrongs')}
                                    className={`px-3 py-1.5 rounded-lg text-[13px] font-bold transition-all flex items-center gap-1.5 ${vocabDetailTab === 'wrongs' ? 'bg-[#FFF5F2] text-[#c0614a]' : 'text-gray-400 hover:bg-gray-50'}`}>
                                    오답 노트
                                    <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${matchedWrongs.length > 0 ? 'bg-[#E07A5F] text-white' : 'bg-gray-200 text-gray-500'}`}>{matchedWrongs.length}</span>
                                </button>
                            </div>
                            
                            <div className="p-6 pt-2 overflow-y-auto flex-1">
                                {/* 1. 뜻/설명 탭 */}
                                {vocabDetailTab === 'explanation' && (
                                    <div className="bg-[#FDFBF7] border border-[#F4F0EA] rounded-xl p-5 min-h-[120px]">
                                        {(() => {
                                            const targetId = word.vocabPageId || word.id;
                                            const cache = cachedExplanations[targetId];
                                            if (!cache || cache.isLoading) {
                                                return (
                                                    <div className="flex flex-col items-center justify-center h-full min-h-[100px] gap-3 text-gray-400">
                                                        <span className="spin inline-block w-6 h-6 border-[3px] border-gray-200 border-t-[#A67B5B] rounded-full"/>
                                                        <span className="text-[12px] font-bold">노션에서 뜻을 불러오는 중...</span>
                                                    </div>
                                                );
                                            }
                                            if (cache.error) {
                                                return <div className="text-[#E56B6F] text-[13px] font-medium">{cache.error}</div>;
                                            }
                                            return <div className="text-[14px] text-gray-700 whitespace-pre-wrap leading-relaxed">{cache.text}</div>;
                                        })()}
                                    </div>
                                )}

                                {/* 2. 학습 노트 탭 */}
                                {vocabDetailTab === 'notes' && (
                                    <div className="flex flex-col gap-2">
                                        {matchedNotes.length === 0 ? (
                                            <div className="text-center py-6 text-gray-400 text-[12px]">연결된 학습 노트가 없습니다.</div>
                                        ) : (
                                            matchedNotes.map(n => (
                                                <a key={n.id} href={`https://www.notion.so/${n.id.replace(/-/g, '')}`} target="_blank" rel="noopener noreferrer" 
                                                    className="w-full flex items-center justify-between p-3.5 rounded-xl bg-white border border-gray-100 hover:border-[#849F71] hover:shadow-md transition-all text-left group no-underline">
                                                    <div className="flex flex-col min-w-0 mr-3">
                                                        <span className="text-[13px] font-bold text-gray-700 truncate group-hover:text-[#4a7c5e] transition-colors">{n.title}</span>
                                                        <span className="text-[10px] text-gray-400 mt-0.5">{new Date(n.createdTime).toLocaleDateString()}</span>
                                                    </div>
                                                    <div className="w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-[#F3F8F5] group-hover:text-[#849F71] transition-colors shrink-0">
                                                        <RightArrow size={14} />
                                                    </div>
                                                </a>
                                            ))
                                        )}
                                        <button onClick={() => { setVocabDetailModal({isOpen: false, word: null}); setLinkNoteModal({ isOpen: true, vocab: word, type: 'note' }); setLinkSearchTerm(''); }}
                                            className="mt-2 w-full border border-dashed border-[#849F71]/50 text-[#4a7c5e] bg-[#F3F8F5]/50 hover:bg-[#F3F8F5] font-bold py-3 rounded-xl transition text-[12px] flex items-center justify-center gap-1.5">
                                            <PlusIcon/> 새 학습 노트 연결/추가
                                        </button>
                                    </div>
                                )}

                                {/* 3. 오답 노트 탭 */}
                                {vocabDetailTab === 'wrongs' && (
                                    <div className="flex flex-col gap-2">
                                        {matchedWrongs.length === 0 ? (
                                            <div className="text-center py-6 text-gray-400 text-[12px]">연결된 오답 노트가 없습니다.</div>
                                        ) : (
                                            matchedWrongs.map(w => (
                                                <a key={w.id} href={`https://www.notion.so/${w.id.replace(/-/g, '')}`} target="_blank" rel="noopener noreferrer" 
                                                    className="w-full flex items-center justify-between p-3.5 rounded-xl bg-white border border-gray-100 hover:border-[#E07A5F] hover:shadow-md transition-all text-left group no-underline">
                                                    <div className="flex flex-col min-w-0 mr-3">
                                                        <span className="text-[13px] font-bold text-gray-700 truncate group-hover:text-[#c0614a] transition-colors">{w.title}</span>
                                                        <span className="text-[10px] text-gray-400 mt-0.5">{new Date(w.createdTime).toLocaleDateString()}</span>
                                                    </div>
                                                    <div className="w-6 h-6 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-[#FFF5F2] group-hover:text-[#E07A5F] transition-colors shrink-0">
                                                        <RightArrow size={14} />
                                                    </div>
                                                </a>
                                            ))
                                        )}
                                        <button onClick={() => { setVocabDetailModal({isOpen: false, word: null}); setLinkNoteModal({ isOpen: true, vocab: word, type: 'wrong' }); setLinkSearchTerm(''); }}
                                            className="mt-2 w-full border border-dashed border-[#E07A5F]/50 text-[#c0614a] bg-[#FFF5F2]/50 hover:bg-[#FFF5F2] font-bold py-3 rounded-xl transition text-[12px] flex items-center justify-center gap-1.5">
                                            <PlusIcon/> 새 오답 노트 연결/추가
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            })()}

            {/* ── 마스터 단어 초기화 확인 모달 ── */}
            {resetModal.isOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[2px]">
                    <div className="bg-white rounded-[2rem] w-full max-w-sm p-7 shadow-2xl relative flex flex-col transform transition-all">
                        <div className="w-12 h-12 rounded-full bg-[#FFF5F2] flex items-center justify-center text-[#E56B6F] mb-5 border border-[#FFE9E4]">
                            <RefreshIcon size={20} />
                        </div>
                        <h3 className="text-[17px] font-extrabold text-gray-800 mb-2">마스터한 단어에서 제외할까요?</h3>
                        <p className="text-[13px] text-gray-500 mb-8 leading-relaxed">
                            <span className="font-bold text-[#E56B6F]">'{resetModal.word?.title}'</span> 단어의 누적 통과 횟수가 0으로 초기화되며, 암기 목록으로 다시 돌아갑니다.
                        </p>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setResetModal({ isOpen: false, word: null })} className="flex-1 py-3.5 rounded-xl text-sm font-bold bg-[#FDFBF7] text-gray-500 border border-gray-200 hover:bg-gray-50 transition-colors">유지하기</button>
                            <button onClick={handleConfirmResetMaster} disabled={loading} className="flex-1 py-3.5 rounded-xl text-sm font-bold bg-[#E56B6F] text-white shadow-sm hover:bg-[#d4585d] transition-colors disabled:opacity-50">{loading ? '처리 중...' : '0부터 다시 시작'}</button>
                        </div>
                    </div>
                </div>
            )}

            {/* 밀린 할일 전체보기 모달 */}
            {showOverdueModal && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[2px]">
                    <div className="bg-white rounded-3xl w-full max-w-sm max-h-[85vh] flex flex-col shadow-2xl relative">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100">
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                <span className="text-[#E07A5F]">📋</span> 밀린 할일 전체
                                <span className="bg-[#FFF5F2] px-2 py-0.5 rounded-md text-[12px] text-[#E07A5F]">{overdueTodos.length}</span>
                            </h3>
                            <button onClick={() => setShowOverdueModal(false)} className="p-1 text-gray-400 hover:text-gray-600 transition-colors bg-gray-50 rounded-full">
                                <XIcon />
                            </button>
                        </div>
                        
                        <div className="p-4 border-b border-gray-100 bg-[#FDFBF7] flex items-center gap-2">
                            <button
                                onClick={() => { handleBulkMove(todayNum); setShowOverdueModal(false); }}
                                disabled={isBulkMoving}
                                className="flex-1 h-[40px] text-[12px] font-bold bg-[#A67B5B] text-white rounded-xl hover:bg-[#8B664B] transition-colors disabled:opacity-60"
                            >
                                일괄 오늘로
                            </button>
                            
                            <div className="relative flex-1 h-[40px]">
                                <button
                                    onClick={() => {
                                        if (dateInputRef.current) {
                                            try { dateInputRef.current.showPicker(); } catch (e) { dateInputRef.current.focus(); }
                                        }
                                    }}
                                    className="w-full h-full flex items-center justify-center text-[12px] font-bold text-[#8B664B] bg-[#F4F0EA] rounded-xl hover:bg-[#EBE8DE] transition-colors gap-1.5"
                                >
                                    일괄 날짜 지정 <span>📅</span>
                                </button>
                                <input 
                                    ref={dateInputRef}
                                    type="date"
                                    onChange={(e) => {
                                        if(e.target.value) {
                                            handleBulkMove(normalizeDate(new Date(e.target.value)));
                                            setShowOverdueModal(false);
                                            e.target.value = '';
                                        }
                                    }}
                                    className="absolute right-0 bottom-0 w-0 h-0 opacity-0 p-0 m-0 border-none"
                                    title="일괄 특정 날짜로 이동"
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-5 space-y-6">
                            {overdueGrouped.length === 0 ? (
                                <p className="text-sm text-gray-400 text-center py-6">모든 밀린 할 일을 처리했습니다! 🎉</p>
                            ) : (
                                overdueGrouped.map(([dateStr, todosList]) => (
                                    <div key={dateStr}>
                                        <h4 className="text-[12px] font-bold text-gray-400 mb-3 border-b border-gray-100 pb-1">
                                            {formatKORDateShort(dateStr)}
                                        </h4>
                                        <div className="flex flex-col gap-1.5">
                                            {todosList.map(todo => (
                                                <div key={todo.id} className="flex justify-between items-center group bg-white hover:bg-gray-50 p-2 -mx-2 rounded-xl transition-colors">
                                                    <div className="flex items-center gap-2.5 flex-1 min-w-0 mr-3">
                                                        <div className="w-1.5 h-1.5 rounded-full bg-[#E07A5F] shrink-0"></div>
                                                        <span className="text-[14px] font-medium text-gray-700 truncate">{todo.title}</span>
                                                    </div>
                                                    <div className="flex items-center gap-1.5 shrink-0 md:opacity-0 md:group-hover:opacity-100 focus-within:opacity-100 transition-opacity">
                                                        <button onClick={() => handleMoveTodo(todo, todayNum)} className="text-[11px] font-bold bg-white border border-gray-200 text-gray-500 px-3 py-1.5 rounded-lg hover:bg-latte-50 hover:text-latte-600 transition-colors shadow-sm">오늘로</button>
                                                        <button onClick={() => deleteTodo(todo)} className="text-[11px] font-bold bg-white border border-gray-200 text-gray-400 px-3 py-1.5 rounded-lg hover:bg-red-50 hover:text-red-500 transition-colors shadow-sm">삭제</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            )}

            {/* PDF 내보내기 옵션 모달 */}
            {showPrintOptions && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[2px]">
                    <div className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl relative">
                        <button onClick={() => setShowPrintOptions(false)} className="absolute top-4 right-4 p-1 text-gray-400 hover:bg-gray-100 rounded-full transition"><XIcon/></button>
                        <h3 className="text-xl font-bold text-gray-800 mb-2">리포트 내보내기</h3>
                        <p className="text-sm text-gray-500 mb-6">PDF로 저장할 리포트의 유형을 선택하세요.</p>
                        
                        <div className="flex flex-col gap-3">
                            <label className={`flex items-start gap-3 p-4 rounded-xl border-2 cursor-pointer transition-colors ${printOption === 'full' ? 'border-[#849F71] bg-[#F3F8F5]' : 'border-gray-100 hover:border-gray-200'}`}>
                                <input type="radio" name="printOption" value="full" checked={printOption === 'full'} onChange={() => setPrintOption('full')} className="mt-1" />
                                <div>
                                    <div className={`font-bold ${printOption === 'full' ? 'text-[#6c855a]' : 'text-gray-700'}`}>전체 리포트</div>
                                    <div className="text-[11px] text-gray-500 mt-0.5">누적 현황, 차트, 과목 밸런스, 잔디 그래프 전체를 포함합니다.</div>
                                </div>
                            </label>
                            
                            <label className={`flex items-start gap-3 p-4 rounded-xl border-2 cursor-pointer transition-colors ${printOption === 'summary' ? 'border-[#849F71] bg-[#F3F8F5]' : 'border-gray-100 hover:border-gray-200'}`}>
                                <input type="radio" name="printOption" value="summary" checked={printOption === 'summary'} onChange={() => setPrintOption('summary')} className="mt-1" />
                                <div>
                                    <div className={`font-bold ${printOption === 'summary' ? 'text-[#6c855a]' : 'text-gray-700'}`}>핵심 요약 리포트</div>
                                    <div className="text-[11px] text-gray-500 mt-0.5">핵심 누적 데이터와 주요 인사이트만 간략하게 포함합니다.</div>
                                </div>
                            </label>
                        </div>

                        <button 
                            onClick={() => { setShowPrintOptions(false); setPrintMode(true); }}
                            className="w-full bg-[#849F71] text-white font-bold py-3.5 rounded-xl hover:bg-[#728d5f] transition shadow-sm mt-6"
                        >
                            출력 뷰어 열기
                        </button>
                    </div>
                </div>
            )}

            {/* ── 노트 연결/추가 모달 ── */}
            {linkNoteModal.isOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[2px]">
                    <div className="bg-white rounded-[2rem] w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl relative transform transition-all">
                        <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                            <div>
                                <h3 className="text-[18px] font-extrabold text-gray-800">
                                    {linkNoteModal.type === 'note' ? '학습 노트' : '오답 노트'} 연결
                                </h3>
                                <p className="text-[12px] text-gray-400 font-medium mt-0.5">'{linkNoteModal.vocab?.title}' 단어와 연결할 노트를 선택하세요.</p>
                            </div>
                            <button onClick={() => setLinkNoteModal({ ...linkNoteModal, isOpen: false })} className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition-colors outline-none">
                                <XIcon/>
                            </button>
                        </div>
                        
                        <div className="p-5 flex flex-col gap-4 overflow-hidden">
                            {/* 검색창 */}
                            <div className="relative">
                                <input 
                                    type="text" 
                                    placeholder="기존 노트 검색..." 
                                    value={linkSearchTerm}
                                    onChange={e => setLinkSearchTerm(e.target.value)}
                                    className="w-full bg-gray-50 border border-gray-200 rounded-xl py-3 pl-4 pr-10 text-sm focus:outline-none focus:border-[#A67B5B] transition-colors"
                                />
                                <div className="absolute right-3 top-1/2 -translate-y-1/2 text-gray-300">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                                </div>
                            </div>

                            {/* 검색 결과 리스트 */}
                            <div className="flex-1 overflow-y-auto space-y-2 min-h-[200px] pr-1">
                                {(() => {
                                    const pool = linkNoteModal.type === 'note' ? notes : wrongs;
                                    const filtered = pool.filter(n => n.title.toLowerCase().includes(linkSearchTerm.toLowerCase())).slice(0, 10);
                                    
                                    if (filtered.length === 0) return (
                                        <div className="flex flex-col items-center justify-center py-10 text-gray-400">
                                            <span className="text-2xl mb-2">🔍</span>
                                            <p className="text-[12px]">검색 결과가 없습니다.</p>
                                        </div>
                                    );

                                    return filtered.map(n => (
                                        <button 
                                            key={n.id}
                                            onClick={() => handleLinkNote(n.id)}
                                            className="w-full flex items-center justify-between p-3.5 rounded-xl bg-white border border-gray-100 hover:border-[#A67B5B] hover:bg-[#FDFBF7] transition-all text-left group"
                                        >
                                            <div className="flex flex-col min-w-0 mr-3">
                                                <span className="text-[14px] font-bold text-gray-700 truncate">{n.title}</span>
                                                <span className="text-[10px] text-gray-400 mt-0.5">{new Date(n.createdTime).toLocaleDateString()}</span>
                                            </div>
                                            <span className="shrink-0 text-[11px] font-bold text-[#A67B5B] opacity-0 group-hover:opacity-100 transition-opacity">연결하기</span>
                                        </button>
                                    ));
                                })()}
                            </div>
                        </div>

                        <div className="p-6 bg-gray-50 rounded-b-[2rem] border-t border-gray-100">
                            <button 
                                onClick={handleCreateAndLinkNote}
                                className="w-full bg-[#A67B5B] text-white font-bold py-4 rounded-xl hover:bg-[#8B664B] transition shadow-md flex items-center justify-center gap-2"
                            >
                                <PlusIcon/> 새로운 {linkNoteModal.type === 'note' ? '학습' : '오답'} 노트 만들기
                            </button>
                        </div>
                    </div>
                </div>
            )}

            {/* ── 다중 노트 목록 보기 모달 ── */}
            {viewNotesModal.isOpen && (
                <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/40 backdrop-blur-[2px]">
                    <div className="bg-white rounded-[2rem] w-full max-w-sm max-h-[80vh] flex flex-col shadow-2xl relative transform transition-all">
                        <div className="p-6 border-b border-gray-100 flex items-center justify-between">
                            <div>
                                <h3 className="text-[18px] font-extrabold text-gray-800 flex items-center gap-2">
                                    {viewNotesModal.type === 'note' ? '📚 학습 노트 목록' : '🚨 오답 노트 목록'}
                                </h3>
                                <p className="text-[12px] text-gray-400 font-medium mt-1">'{viewNotesModal.vocab?.title}' 단어에 연결된 노트들입니다.</p>
                            </div>
                            <button onClick={() => setViewNotesModal({ ...viewNotesModal, isOpen: false })} className="w-8 h-8 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 hover:bg-gray-100 transition-colors outline-none">
                                <XIcon/>
                            </button>
                        </div>
                        
                        <div className="p-5 flex-1 overflow-y-auto space-y-2 max-h-[350px]">
                            {viewNotesModal.notes.map(n => (
                                <a 
                                    key={n.id}
                                    href={`https://www.notion.so/${n.id.replace(/-/g, '')}`} 
                                    target="_blank" rel="noopener noreferrer"
                                    className="w-full flex items-center justify-between p-4 rounded-xl bg-white border border-gray-100 hover:border-[#A67B5B] hover:shadow-md transition-all text-left group no-underline"
                                >
                                    <div className="flex flex-col min-w-0 mr-3">
                                        <span className="text-[14px] font-bold text-gray-700 truncate group-hover:text-[#A67B5B] transition-colors">{n.title}</span>
                                        <span className="text-[10px] text-gray-400 mt-0.5">{new Date(n.createdTime).toLocaleDateString()}</span>
                                    </div>
                                    <div className="w-7 h-7 rounded-full bg-gray-50 flex items-center justify-center text-gray-400 group-hover:bg-[#F4F0EA] group-hover:text-[#A67B5B] transition-colors shrink-0">
                                        <RightArrow size={14} />
                                    </div>
                                </a>
                            ))}
                        </div>
                    </div>
                </div>
            )}

            {/* 글로벌 토스트 메시지 */}
            <div 
                className={`fixed bottom-8 left-1/2 -translate-x-1/2 z-[200] transition-all duration-300 ${toast.visible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-4 pointer-events-none'}`}
                role="alert"
            >
                <div className={`px-5 py-3 rounded-full shadow-[0_10px_40px_rgba(0,0,0,0.15)] flex items-center gap-2.5 text-[13px] font-bold tracking-tight ${toast.type === 'error' ? 'bg-[#E56B6F] text-white' : 'bg-gray-800 text-white'}`}>
                    {toast.type === 'error' ? '⚠️' : '✨'} {toast.message}
                </div>
            </div>
        </>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
