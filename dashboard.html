<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코지 카페 대시보드</title>
    <!-- React & Tailwind -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        latte: {
                            50: '#F4F0EA',
                            100: '#EBE8DE',
                            300: '#D1CBBF',
                            500: '#A67B5B',
                            700: '#8B664B',
                            900: '#5C3A21',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 탭 전환 애니메이션 */
        .tab-content { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 로딩 스피너 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
        
        /* 차트 바 호버 효과 */
        .chart-bar { transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; }
        .chart-bar:hover { opacity: 0.8; }
        
        /* 잔디심기 툴팁 */
        .grass-cell { position: relative; }
        .grass-cell .tooltip {
            visibility: hidden; opacity: 0; transition: opacity 0.2s;
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-4px);
            background: #4A4A4A; color: white; padding: 4px 8px; border-radius: 4px; font-size: 10px;
            white-space: nowrap; z-index: 10; pointer-events: none;
        }
        .grass-cell:hover .tooltip { visibility: visible; opacity: 1; }
        
        /* 도넛 차트 애니메이션 */
        .donut-segment {
            transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1), stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body>
<div id="root" class="w-full h-full flex justify-center items-center p-4"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ── 아이콘 ── */
const BarChartIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
const PieChartIcon = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
const GridIcon     = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>;
const RefreshIcon  = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>;
const GearIcon     = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;

/* ── 테마 팔레트 (도넛 차트용) ── */
const CHART_COLORS = ['#A67B5B', '#849F71', '#D4A373', '#D98891', '#5C3A21', '#9CA3AF', '#D1CBBF'];

/* ── 포맷 & 유틸 ── */
const fmtMinToHour = (min) => {
    const h = Math.floor(min / 60);
    const m = Math.floor(min % 60);
    if (h === 0) return `${m}분`;
    if (m === 0) return `${h}시간`;
    return `${h}h ${m}m`;
};
const getDayKOR = (dayIdx) => ['일', '월', '화', '수', '목', '금', '토'][dayIdx];
const normalizeDate = (d) => { const nd = new Date(d); nd.setHours(0,0,0,0); return nd.getTime(); };

/* ── 로컬스토리지 (타이머 위젯과 연동) ── */
const LS_CONFIG = 'cozy_timer_config';
const loadConfig = () => JSON.parse(localStorage.getItem(LS_CONFIG)) || {};

const App = () => {
    const [config, setConfig] = useState(loadConfig());
    const [records, setRecords] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState('');
    const [activeTab, setActiveTab] = useState('weekly'); // 'weekly' | 'subject' | 'heatmap'

    /* ── 노션 데이터 로드 (최근 200개) ── */
    const fetchData = useCallback(async () => {
        if (!config.saved || !config.proxyUrl || !config.apiKey || !config.recordDbId) {
            setLoading(false); return;
        }
        setLoading(true); setError('');
        try {
            // 잔디심기(최대 12주)를 위해 넉넉히 200개 호출
            const res = await fetch(`${config.proxyUrl}/v1/databases/${config.recordDbId}/query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': config.apiKey, 'x-notion-version': '2022-06-28' },
                body: JSON.stringify({ sorts: [{ property: '날짜', direction: 'descending' }], page_size: 200 }),
            });
            if (!res.ok) throw new Error('데이터를 불러오지 못했습니다.');
            const data = await res.json();
            
            const parsed = data.results.map(page => {
                // 과목명 파싱 (타이머 위젯 로직 동일 적용: "[과목명] 날짜" 형식)
                const titleProp = Object.values(page.properties).find(p => p.type === 'title');
                const titleText = titleProp?.title?.[0]?.plain_text || '미선택';
                const subjMatch = titleText.match(/^\[(.*?)\]/);
                const subject = subjMatch ? subjMatch[1] : '기타';

                // 순공시간(분) & 날짜
                const minutes = page.properties['순공시간']?.number || 0;
                const startIso = page.properties['날짜']?.date?.start || page.created_time;
                
                return { subject, minutes, date: normalizeDate(startIso) };
            });
            setRecords(parsed);
        } catch (e) {
            setError(e.message);
        } finally {
            setLoading(false);
        }
    }, [config]);

    useEffect(() => { fetchData(); }, [fetchData]);

    /* ══════ 데이터 가공 로직 ══════ */
    
    // 1. 주간 데이터 (최근 7일)
    const weeklyData = useMemo(() => {
        const today = normalizeDate(new Date());
        const days = [];
        let maxMin = 1; // 0 방지
        for (let i = 6; i >= 0; i--) {
            const dTime = today - (i * 86400000);
            const dateObj = new Date(dTime);
            const dayRecords = records.filter(r => r.date === dTime);
            const totalMin = dayRecords.reduce((acc, r) => acc + r.minutes, 0);
            if (totalMin > maxMin) maxMin = totalMin;
            days.push({
                label: getDayKOR(dateObj.getDay()),
                dateStr: `${dateObj.getMonth()+1}/${dateObj.getDate()}`,
                totalMin,
                isToday: i === 0
            });
        }
        return { days, maxMin };
    }, [records]);

    // 2. 과목 비율 (전체 또는 최근 200개 기준)
    const subjectData = useMemo(() => {
        const sums = {};
        let total = 0;
        records.forEach(r => {
            sums[r.subject] = (sums[r.subject] || 0) + r.minutes;
            total += r.minutes;
        });
        const list = Object.entries(sums)
            .map(([name, min]) => ({ name, min, percent: total > 0 ? (min/total)*100 : 0 }))
            .sort((a, b) => b.min - a.min); // 내림차순
        return { list, total };
    }, [records]);

    // 3. 잔디 심기 (최근 12주 = 84일)
    const heatmapData = useMemo(() => {
        const todayObj = new Date();
        const today = normalizeDate(todayObj);
        const daysCount = 12 * 7; // 84셀
        const cells = [];
        
        // 일요일 기준으로 정렬하기 위해, 배열의 끝이 오늘이 되도록 함
        const todayDayOfWeek = todayObj.getDay(); 
        // 84개 셀 중 마지막 셀이 위치할 인덱스 계산을 위해 과거로 거슬러 올라감
        const startDate = today - ((daysCount - 1) * 86400000); 

        for (let i = 0; i < daysCount; i++) {
            const currentDTime = startDate + (i * 86400000);
            const dObj = new Date(currentDTime);
            
            // 미래 날짜는 빈 셀 처리
            if (currentDTime > today) {
                cells.push({ empty: true });
                continue;
            }

            const dayRecords = records.filter(r => r.date === currentDTime);
            const totalMin = dayRecords.reduce((acc, r) => acc + r.minutes, 0);
            
            // 레벨 산정 (0: 없음, 1: 30분 미만, 2: 1시간 미만, 3: 2시간 미만, 4: 2시간 이상)
            let level = 0;
            if (totalMin > 0) level = 1;
            if (totalMin >= 30) level = 2;
            if (totalMin >= 60) level = 3;
            if (totalMin >= 120) level = 4;

            cells.push({
                dateStr: `${dObj.getFullYear()}-${String(dObj.getMonth()+1).padStart(2,'0')}-${String(dObj.getDate()).padStart(2,'0')}`,
                totalMin,
                level,
                isFuture: false
            });
        }
        return cells;
    }, [records]);


    /* ══════ 렌더링 ══════ */
    if (!config.saved) {
        return (
            <div className="w-full max-w-[340px] bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] p-8 text-center shadow-sm">
                <div className="w-12 h-12 bg-latte-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <GearIcon className="text-latte-500" />
                </div>
                <h3 className="text-gray-800 font-bold mb-2">설정이 필요해요</h3>
                <p className="text-sm text-gray-400 mb-5">먼저 타이머 위젯에서<br/>Notion DB를 연결해 주세요.</p>
            </div>
        );
    }

    return (
        <div className="w-full max-w-[340px] bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] relative overflow-hidden shadow-sm flex flex-col" style={{ height: '420px' }}>
            
            {/* Header */}
            <div className="px-7 pt-7 pb-4 flex justify-between items-center bg-[#FDFBF7] z-10">
                <div>
                    <span className="text-xs font-bold tracking-widest text-latte-300 uppercase flex items-center gap-1.5">
                        COZY DASHBOARD
                        {loading && <span className="spin inline-block w-2 h-2 border-2 border-latte-300 border-t-transparent rounded-full"/>}
                    </span>
                    <h2 className="text-xl font-bold text-gray-800 mt-1">공부 기록</h2>
                </div>
                <button onClick={fetchData} className="p-2 -mr-2 text-gray-300 hover:text-latte-500 transition-colors bg-white rounded-full border border-[#EBE8DE] shadow-sm">
                    <RefreshIcon />
                </button>
            </div>

            {/* Tab Navigation */}
            <div className="px-7 pb-4">
                <div className="flex bg-latte-50 p-1 rounded-2xl relative">
                    <div className="absolute top-1 bottom-1 w-[calc(33.33%-4px)] rounded-xl bg-white shadow-sm transition-transform duration-300 ease-out"
                         style={{ transform: `translateX(${activeTab === 'weekly' ? '4px' : activeTab === 'subject' ? 'calc(100% + 4px)' : 'calc(200% + 4px)'})` }}/>
                    
                    <button onClick={() => setActiveTab('weekly')} className={`relative z-10 flex-1 py-2 flex justify-center items-center gap-1.5 text-xs font-bold transition-colors ${activeTab === 'weekly' ? 'text-gray-800' : 'text-gray-400'}`}>
                        <BarChartIcon /> <span className="mt-0.5">주간</span>
                    </button>
                    <button onClick={() => setActiveTab('subject')} className={`relative z-10 flex-1 py-2 flex justify-center items-center gap-1.5 text-xs font-bold transition-colors ${activeTab === 'subject' ? 'text-gray-800' : 'text-gray-400'}`}>
                        <PieChartIcon /> <span className="mt-0.5">과목</span>
                    </button>
                    <button onClick={() => setActiveTab('heatmap')} className={`relative z-10 flex-1 py-2 flex justify-center items-center gap-1.5 text-xs font-bold transition-colors ${activeTab === 'heatmap' ? 'text-gray-800' : 'text-gray-400'}`}>
                        <GridIcon /> <span className="mt-0.5">발자취</span>
                    </button>
                </div>
            </div>

            {/* Content Area */}
            <div className="flex-1 px-7 pb-7 overflow-hidden relative">
                {error ? (
                    <div className="h-full flex flex-col items-center justify-center text-center">
                        <span className="text-2xl mb-2">😢</span>
                        <p className="text-sm text-red-400">{error}</p>
                    </div>
                ) : loading && records.length === 0 ? (
                    <div className="h-full flex flex-col items-center justify-center">
                        <span className="spin w-6 h-6 border-2 border-latte-500 border-t-transparent rounded-full mb-3"></span>
                        <p className="text-xs text-gray-400">노션에서 기록을 불러오는 중...</p>
                    </div>
                ) : (
                    <>
                        {/* 1. 주간 추이 탭 */}
                        {activeTab === 'weekly' && (
                            <div className="tab-content h-full flex flex-col">
                                <div className="mb-4">
                                    <div className="text-xs text-gray-400 font-medium">최근 7일 순공시간</div>
                                    <div className="text-2xl font-bold text-latte-500 tabular-nums">
                                        {fmtMinToHour(weeklyData.days.reduce((a,b)=>a+b.totalMin, 0))}
                                    </div>
                                </div>
                                
                                <div className="flex-1 flex items-end justify-between gap-2 pt-2">
                                    {weeklyData.days.map((day, idx) => (
                                        <div key={idx} className="flex-1 flex flex-col items-center group cursor-default">
                                            {/* 바(Bar) */}
                                            <div className="w-full flex flex-col justify-end h-32 mb-2 relative">
                                                <div className="absolute bottom-full mb-1 opacity-0 group-hover:opacity-100 transition-opacity text-[10px] font-bold text-gray-600 w-full text-center">
                                                    {day.totalMin}m
                                                </div>
                                                <div 
                                                    className={`chart-bar w-full rounded-md ${day.isToday ? 'bg-latte-500' : 'bg-latte-100'}`}
                                                    style={{ height: `${Math.max((day.totalMin / weeklyData.maxMin) * 100, 4)}%` }}
                                                ></div>
                                            </div>
                                            {/* 라벨 */}
                                            <div className={`text-[10px] font-bold ${day.isToday ? 'text-gray-800' : 'text-gray-400'}`}>
                                                {day.label}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 2. 과목 비중 탭 */}
                        {activeTab === 'subject' && (
                            <div className="tab-content h-full flex flex-col items-center justify-center">
                                {subjectData.total === 0 ? (
                                    <p className="text-sm text-gray-400">기록된 과목 데이터가 없습니다.</p>
                                ) : (
                                    <div className="w-full flex items-center justify-between gap-4">
                                        {/* SVG 도넛 차트 */}
                                        <div className="relative w-32 h-32 flex-shrink-0">
                                            <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
                                                <circle cx="50" cy="50" r="40" fill="transparent" stroke="#EBE8DE" strokeWidth="12" />
                                                {(() => {
                                                    let offset = 0;
                                                    const circ = 2 * Math.PI * 40;
                                                    return subjectData.list.map((item, i) => {
                                                        const strokeDasharray = `${(item.percent / 100) * circ} ${circ}`;
                                                        const strokeDashoffset = -offset;
                                                        offset += (item.percent / 100) * circ;
                                                        return (
                                                            <circle key={item.name} cx="50" cy="50" r="40" fill="transparent"
                                                                stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth="12"
                                                                strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset}
                                                                className="donut-segment" strokeLinecap="round" />
                                                        );
                                                    });
                                                })()}
                                            </svg>
                                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                <span className="text-[10px] text-gray-400 font-bold">Total</span>
                                                <span className="text-sm font-bold text-gray-800 tabular-nums">{fmtMinToHour(subjectData.total)}</span>
                                            </div>
                                        </div>
                                        
                                        {/* 과목 범례 (Legend) */}
                                        <div className="flex-1 flex flex-col gap-2.5 overflow-y-auto max-h-[160px] pr-1">
                                            {subjectData.list.map((item, i) => (
                                                <div key={item.name} className="flex items-center justify-between text-xs">
                                                    <div className="flex items-center gap-2 truncate">
                                                        <span className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ backgroundColor: CHART_COLORS[i % CHART_COLORS.length] }}></span>
                                                        <span className="text-gray-700 font-medium truncate">{item.name}</span>
                                                    </div>
                                                    <span className="text-gray-400 font-bold tabular-nums ml-2">{Math.round(item.percent)}%</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 3. 잔디 심기 탭 */}
                        {activeTab === 'heatmap' && (
                            <div className="tab-content h-full flex flex-col">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="text-xs text-gray-400 font-medium">최근 12주 공부 기록</div>
                                    <div className="flex items-center gap-1">
                                        <span className="text-[9px] text-gray-300">Less</span>
                                        <div className="flex gap-0.5">
                                            <div className="w-2 h-2 rounded-sm bg-latte-50"></div>
                                            <div className="w-2 h-2 rounded-sm bg-latte-500 opacity-30"></div>
                                            <div className="w-2 h-2 rounded-sm bg-latte-500 opacity-60"></div>
                                            <div className="w-2 h-2 rounded-sm bg-latte-500 opacity-90"></div>
                                            <div className="w-2 h-2 rounded-sm bg-latte-900"></div>
                                        </div>
                                        <span className="text-[9px] text-gray-300">More</span>
                                    </div>
                                </div>

                                <div className="flex-1 flex justify-center items-center">
                                    {/* CSS Grid를 활용한 컬럼형 잔디밭 (세로 7칸, 가로 12칸) */}
                                    <div className="grid grid-rows-7 grid-flow-col gap-1.5 p-3 bg-white rounded-2xl border border-[#EBE8DE] shadow-sm">
                                        {heatmapData.map((cell, idx) => {
                                            if (cell.empty) return <div key={idx} className="w-3.5 h-3.5 rounded-[4px] bg-transparent"></div>;
                                            
                                            // 레벨에 따른 색상 클래스
                                            const bgClass = cell.level === 0 ? 'bg-latte-50' 
                                                          : cell.level === 1 ? 'bg-latte-500/30'
                                                          : cell.level === 2 ? 'bg-latte-500/60'
                                                          : cell.level === 3 ? 'bg-latte-500/90'
                                                          : 'bg-latte-900';
                                            return (
                                                <div key={idx} className={`grass-cell w-3.5 h-3.5 rounded-[4px] ${bgClass} transition-transform hover:scale-110 cursor-crosshair`}>
                                                    <div className="tooltip">
                                                        {cell.dateStr} : {cell.totalMin > 0 ? `${fmtMinToHour(cell.totalMin)}` : '기록 없음'}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}
                    </>
                )}
            </div>
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
