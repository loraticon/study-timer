<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코지 카페 와이드 대시보드</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['pretendard', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
                    },
                    colors: {
                        latte: {
                            50: '#F4F0EA',
                            100: '#EBE8DE',
                            300: '#D1CBBF',
                            500: '#A67B5B',
                            700: '#8B664B',
                            900: '#5C3A21',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; padding: 16px; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: transparent; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 로딩 스피너 */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { animation: spin 0.8s linear infinite; }
        
        /* 차트 바 애니메이션 */
        .chart-bar { transition: height 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s; }
        .chart-bar:hover { opacity: 0.8; }
        
        /* 잔디심기 툴팁 */
        .grass-cell { position: relative; }
        .grass-cell:hover { z-index: 20; }
        .grass-cell .tooltip {
            visibility: hidden; opacity: 0; transition: opacity 0.2s;
            position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%) translateY(-4px);
            background: #4A4A4A; color: white; padding: 4px 8px; border-radius: 6px; font-size: 11px;
            white-space: nowrap; z-index: 10; pointer-events: none; font-weight: bold;
        }
        .grass-cell:hover .tooltip { visibility: visible; opacity: 1; }
        
        /* 도넛 차트 애니메이션 */
        .donut-segment { transition: stroke-dasharray 1s cubic-bezier(0.4, 0, 0.2, 1), stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* 부드러운 카드 호버 효과 */
        .soft-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .soft-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
    </style>
</head>
<body>
<div id="root" class="w-full max-w-[960px] h-full flex justify-center items-center"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

/* ── 아이콘 ── */
const RefreshIcon = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>;
const FireIcon    = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E07A5F" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>;
const CrownIcon   = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F2CC8F" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="2 15 2 7 8 11 12 3 16 11 22 7 22 15"/><path d="M2 15h20v4H2z"/></svg>;
const OwlIcon     = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#81B29A" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const TomatoIcon  = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#E56B6F" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v6"/><path d="M12 8c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8z"/><path d="M12 8c2-2 4-2 6-1"/></svg>;

/* ── 테마 팔레트 (도넛 차트용) ── */
const CHART_COLORS = ['#A67B5B', '#849F71', '#D4A373', '#D98891', '#5C3A21', '#9CA3AF', '#D1CBBF'];

/* ── 포맷 & 유틸 ── */
const fmtMinToHour = (min) => {
    const h = Math.floor(min / 60);
    const m = Math.floor(min % 60);
    if (h === 0) return `${m}분`;
    if (m === 0) return `${h}시간`;
    return `${h}h ${m}m`;
};
const getDayKOR = (dayIdx) => ['일', '월', '화', '수', '목', '금', '토'][dayIdx];
const normalizeDate = (d) => { const nd = new Date(d); nd.setHours(0,0,0,0); return nd.getTime(); };

/* ── 로컬스토리지 연동 ── */
const loadConfig = () => JSON.parse(localStorage.getItem('cozy_timer_config')) || {};

const App = () => {
    const [config, setConfig] = useState(loadConfig());
    const [records, setRecords] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState('');

    /* ── 데이터 호출 및 파싱 ── */
    const fetchData = useCallback(async () => {
        if (!config.saved || !config.proxyUrl || !config.apiKey || !config.recordDbId) {
            setLoading(false); return;
        }
        setLoading(true); setError('');
        try {
            const res = await fetch(`${config.proxyUrl}/v1/databases/${config.recordDbId}/query`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-api-key': config.apiKey, 'x-notion-version': '2022-06-28' },
                body: JSON.stringify({ sorts: [{ property: '날짜', direction: 'descending' }], page_size: 300 }),
            });
            if (!res.ok) throw new Error('데이터를 불러오지 못했습니다.');
            const data = await res.json();
            
            const parsed = data.results.map(page => {
                const titleProp = Object.values(page.properties).find(p => p.type === 'title');
                const titleText = titleProp?.title?.[0]?.plain_text || '미선택';
                const subjMatch = titleText.match(/^\[(.*?)\]/);
                const subject = subjMatch ? subjMatch[1] : '기타';
                const minutes = page.properties['순공시간']?.number || 0;
                
                // 날짜, 시간, 모드 파싱
                const startIso = page.properties['날짜']?.date?.start || page.created_time;
                const dObj = new Date(startIso);
                const modeName = page.properties['모드']?.select?.name || '';
                const mode = modeName.includes('뽀모도로') ? 'pomodoro' : 'normal';

                return { subject, minutes, date: normalizeDate(startIso), hour: dObj.getHours(), mode };
            });
            setRecords(parsed);
        } catch (e) {
            setError(e.message);
        } finally {
            setLoading(false);
        }
    }, [config]);

    useEffect(() => { fetchData(); }, [fetchData]);

    /* ══════ 데이터 가공 로직 ══════ */
    
    // 1. 하이라이트 지표 (연속 학습일, 탑 과목, 시간대, 모드)
    const highlights = useMemo(() => {
        if (!records.length) return { streak: 0, topSubj: null, topTimeLabel: '-', pomoPct: 0 };
        
        const today = normalizeDate(new Date());
        
        // 연속 학습일 (어제부터 역추적, 오늘 안 했어도 어제 했으면 유지)
        let streak = 0;
        for (let i = 0; i < 300; i++) {
            const checkD = today - (i * 86400000);
            const dayMins = records.filter(r => r.date === checkD).reduce((a, b) => a + b.minutes, 0);
            if (dayMins > 0) {
                streak++;
            } else if (i > 0) { 
                // 오늘(i=0) 기록이 없는 건 괜찮지만, 과거에 끊겼다면 종료
                break;
            }
        }

        // 이번 주 탑 과목
        const weekAgo = today - 6 * 86400000;
        const weekRecords = records.filter(r => r.date >= weekAgo);
        const subjMap = {};
        weekRecords.forEach(r => subjMap[r.subject] = (subjMap[r.subject] || 0) + r.minutes);
        const sortedSubj = Object.entries(subjMap).sort((a,b)=>b[1]-a[1]);
        const topSubj = sortedSubj.length > 0 ? sortedSubj[0] : null;

        // 주 활동 시간대 (전체 기준)
        const times = { '새벽':0, '오전':0, '오후':0, '저녁':0 };
        records.forEach(r => {
            if (r.hour >= 0 && r.hour < 6) times['새벽'] += r.minutes;
            else if (r.hour >= 6 && r.hour < 12) times['오전'] += r.minutes;
            else if (r.hour >= 12 && r.hour < 18) times['오후'] += r.minutes;
            else times['저녁'] += r.minutes;
        });
        const sortedTimes = Object.entries(times).sort((a,b)=>b[1]-a[1]);
        const topTimeLabel = sortedTimes[0][1] > 0 ? sortedTimes[0][0] : '-';

        // 모드 비율 (전체 기준)
        let pomo = 0, norm = 0;
        records.forEach(r => { if(r.mode === 'pomodoro') pomo += r.minutes; else norm += r.minutes; });
        const pomoPct = (pomo + norm) > 0 ? Math.round((pomo / (pomo + norm)) * 100) : 0;

        return { streak, topSubj, topTimeLabel, pomoPct };
    }, [records]);

    // 2. 주간 차트
    const weeklyData = useMemo(() => {
        const today = normalizeDate(new Date());
        const days = [];
        let maxMin = 1;
        for (let i = 6; i >= 0; i--) {
            const dTime = today - (i * 86400000);
            const dateObj = new Date(dTime);
            const totalMin = records.filter(r => r.date === dTime).reduce((acc, r) => acc + r.minutes, 0);
            if (totalMin > maxMin) maxMin = totalMin;
            days.push({ label: getDayKOR(dateObj.getDay()), totalMin, isToday: i === 0 });
        }
        return { days, maxMin };
    }, [records]);

    // 3. 과목 도넛 차트 (전체)
    const subjectData = useMemo(() => {
        const sums = {};
        let total = 0;
        records.forEach(r => { sums[r.subject] = (sums[r.subject] || 0) + r.minutes; total += r.minutes; });
        const list = Object.entries(sums).map(([name, min]) => ({ name, min, percent: total > 0 ? (min/total)*100 : 0 })).sort((a, b) => b.min - a.min);
        return { list, total };
    }, [records]);

    // 4. 잔디 심기 (최근 12주)
    const heatmapData = useMemo(() => {
        const today = normalizeDate(new Date());
        const cells = [];
        const daysCount = 12 * 7; 
        const startDate = today - ((daysCount - 1) * 86400000); 

        for (let i = 0; i < daysCount; i++) {
            const currentDTime = startDate + (i * 86400000);
            const dObj = new Date(currentDTime);
            if (currentDTime > today) { cells.push({ empty: true }); continue; }

            const totalMin = records.filter(r => r.date === currentDTime).reduce((acc, r) => acc + r.minutes, 0);
            let level = 0;
            if (totalMin > 0) level = 1;
            if (totalMin >= 30) level = 2;
            if (totalMin >= 60) level = 3;
            if (totalMin >= 120) level = 4;

            cells.push({
                dateStr: `${dObj.getFullYear()}년 ${dObj.getMonth()+1}월 ${dObj.getDate()}일`,
                totalMin, level
            });
        }
        return cells;
    }, [records]);


    /* ══════ 렌더링 ══════ */
    if (!config.saved) {
        return (
            <div className="w-full h-[300px] bg-[#FDFBF7] rounded-[2.5rem] flex flex-col items-center justify-center">
                <span className="text-3xl mb-3">☕</span>
                <p className="text-gray-400 font-medium">타이머 위젯에서 Notion DB를 먼저 연결해 주세요.</p>
            </div>
        );
    }

    return (
        <div className="w-full bg-[#FDFBF7] rounded-[2.5rem] border border-[#EBE8DE] p-8 flex flex-col gap-6" style={{ minHeight: '480px' }}>
            
            {/* Header */}
            <div className="flex justify-between items-center">
                <div>
                    <span className="text-xs font-extrabold tracking-widest text-latte-300 uppercase flex items-center gap-2">
                        COZY DASHBOARD
                        {loading && <span className="spin inline-block w-2.5 h-2.5 border-2 border-latte-300 border-t-transparent rounded-full"/>}
                    </span>
                    <h2 className="text-2xl font-bold text-gray-800 mt-1 tracking-tight">공부 기록 요약</h2>
                </div>
                <button onClick={fetchData} className="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-latte-500 transition-colors bg-white rounded-full shadow-sm hover:shadow-md">
                    <RefreshIcon />
                </button>
            </div>

            {error ? (
                <div className="flex-1 flex flex-col items-center justify-center py-10">
                    <p className="text-sm text-red-400">{error}</p>
                </div>
            ) : loading && records.length === 0 ? (
                <div className="flex-1 flex flex-col items-center justify-center py-10">
                    <span className="spin w-8 h-8 border-[3px] border-latte-500 border-t-transparent rounded-full mb-3"></span>
                </div>
            ) : (
                <>
                    {/* 1. 상단 요약 지표 (4 Grid) */}
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {/* 연속 학습일 */}
                        <div className="soft-card bg-white rounded-2xl p-4 flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center flex-shrink-0"><FireIcon/></div>
                            <div>
                                <div className="text-[11px] font-bold text-gray-400 mb-0.5">연속 학습일</div>
                                <div className="text-lg font-bold text-gray-800 leading-tight">{highlights.streak > 0 ? `${highlights.streak}일째` : '오늘부터 1일!'}</div>
                            </div>
                        </div>
                        {/* 이번 주 Top */}
                        <div className="soft-card bg-white rounded-2xl p-4 flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full bg-yellow-50 flex items-center justify-center flex-shrink-0"><CrownIcon/></div>
                            <div className="overflow-hidden">
                                <div className="text-[11px] font-bold text-gray-400 mb-0.5">이번 주 Top 과목</div>
                                <div className="text-lg font-bold text-gray-800 leading-tight truncate">{highlights.topSubj ? highlights.topSubj[0] : '-'}</div>
                            </div>
                        </div>
                        {/* 주 활동 시간대 */}
                        <div className="soft-card bg-white rounded-2xl p-4 flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center flex-shrink-0"><OwlIcon/></div>
                            <div>
                                <div className="text-[11px] font-bold text-gray-400 mb-0.5">집중이 잘 되는 시간</div>
                                <div className="text-lg font-bold text-gray-800 leading-tight">{highlights.topTimeLabel !== '-' ? `${highlights.topTimeLabel}형` : '-'}</div>
                            </div>
                        </div>
                        {/* 모드 비율 */}
                        <div className="soft-card bg-white rounded-2xl p-4 flex items-center gap-4">
                            <div className="w-12 h-12 rounded-full bg-red-50 flex items-center justify-center flex-shrink-0"><TomatoIcon/></div>
                            <div>
                                <div className="text-[11px] font-bold text-gray-400 mb-0.5">집중 모드 선호도</div>
                                <div className="text-lg font-bold text-gray-800 leading-tight">뽀모도로 <span className="text-[#E56B6F]">{highlights.pomoPct}%</span></div>
                            </div>
                        </div>
                    </div>

                    {/* 2. 메인 차트 영역 (3 Columns) */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 flex-1">
                        
                        {/* Col 1: 최근 7일 추이 */}
                        <div className="bg-white rounded-3xl p-6 flex flex-col soft-card">
                            <h3 className="text-sm font-bold text-gray-800 mb-1">최근 7일 순공시간</h3>
                            <p className="text-2xl font-extrabold text-latte-500 tabular-nums mb-6">{fmtMinToHour(weeklyData.days.reduce((a,b)=>a+b.totalMin, 0))}</p>
                            
                            <div className="flex-1 flex items-end justify-between gap-2.5 mt-auto">
                                {weeklyData.days.map((day, idx) => (
                                    <div key={idx} className="flex-1 flex flex-col items-center group cursor-default">
                                        <div className="w-full flex flex-col justify-end h-28 mb-2.5 relative">
                                            <div className="absolute bottom-full mb-1 opacity-0 group-hover:opacity-100 transition-opacity text-[11px] font-bold text-latte-700 w-full text-center">
                                                {day.totalMin > 0 ? `${day.totalMin}m` : ''}
                                            </div>
                                            <div 
                                                className={`chart-bar w-full rounded-lg ${day.isToday ? 'bg-latte-500' : 'bg-[#F4F0EA]'}`}
                                                style={{ height: `${Math.max((day.totalMin / weeklyData.maxMin) * 100, 6)}%` }}
                                            ></div>
                                        </div>
                                        <div className={`text-[11px] font-bold ${day.isToday ? 'text-gray-800' : 'text-gray-400'}`}>
                                            {day.label}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Col 2: 누적 과목 밸런스 */}
                        <div className="bg-white rounded-3xl p-6 flex flex-col soft-card">
                            <h3 className="text-sm font-bold text-gray-800 mb-6">누적 과목 밸런스</h3>
                            {subjectData.total === 0 ? (
                                <div className="flex-1 flex items-center justify-center text-sm text-gray-400">데이터가 없습니다.</div>
                            ) : (
                                <div className="flex flex-col items-center justify-center flex-1 gap-5">
                                    <div className="relative w-32 h-32">
                                        <svg viewBox="0 0 100 100" className="w-full h-full transform -rotate-90">
                                            <circle cx="50" cy="50" r="40" fill="transparent" stroke="#F4F0EA" strokeWidth="14" />
                                            {(() => {
                                                let offset = 0; const circ = 2 * Math.PI * 40;
                                                return subjectData.list.map((item, i) => {
                                                    const strokeDasharray = `${(item.percent / 100) * circ} ${circ}`;
                                                    const strokeDashoffset = -offset;
                                                    offset += (item.percent / 100) * circ;
                                                    return (
                                                        <circle key={item.name} cx="50" cy="50" r="40" fill="transparent"
                                                            stroke={CHART_COLORS[i % CHART_COLORS.length]} strokeWidth="14"
                                                            strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset}
                                                            className="donut-segment" strokeLinecap="round" />
                                                    );
                                                });
                                            })()}
                                        </svg>
                                        <div className="absolute inset-0 flex flex-col items-center justify-center">
                                            <span className="text-[11px] text-gray-400 font-bold leading-none mb-1">Total</span>
                                            <span className="text-base font-bold text-gray-800 tabular-nums leading-none">{fmtMinToHour(subjectData.total)}</span>
                                        </div>
                                    </div>
                                    <div className="w-full flex justify-center flex-wrap gap-x-3 gap-y-2 mt-2">
                                        {subjectData.list.slice(0,4).map((item, i) => (
                                            <div key={item.name} className="flex items-center gap-1.5 text-[11px]">
                                                <span className="w-2.5 h-2.5 rounded-full" style={{ backgroundColor: CHART_COLORS[i % CHART_COLORS.length] }}></span>
                                                <span className="text-gray-600 font-semibold">{item.name} <span className="text-gray-400">{Math.round(item.percent)}%</span></span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Col 3: 최근 12주 발자취 (히트맵) */}
                        <div className="bg-white rounded-3xl p-6 flex flex-col soft-card">
                            <div className="flex justify-between items-start mb-6">
                                <h3 className="text-sm font-bold text-gray-800">최근 12주 발자취</h3>
                                <div className="flex items-center gap-1.5">
                                    <span className="text-[10px] text-gray-300 font-medium">Less</span>
                                    <div className="flex gap-1">
                                        <div className="w-2.5 h-2.5 rounded-sm bg-[#F4F0EA]"></div>
                                        <div className="w-2.5 h-2.5 rounded-sm bg-latte-500 opacity-40"></div>
                                        <div className="w-2.5 h-2.5 rounded-sm bg-latte-500 opacity-70"></div>
                                        <div className="w-2.5 h-2.5 rounded-sm bg-latte-500"></div>
                                        <div className="w-2.5 h-2.5 rounded-sm bg-latte-900"></div>
                                    </div>
                                    <span className="text-[10px] text-gray-300 font-medium">More</span>
                                </div>
                            </div>
                            
                            <div className="flex-1 flex items-center justify-center">
                                <div className="grid grid-rows-7 grid-flow-col gap-1.5">
                                    {heatmapData.map((cell, idx) => {
                                        if (cell.empty) return <div key={idx} className="w-[14px] h-[14px] rounded-[4px] bg-transparent"></div>;
                                        const bgClass = cell.level === 0 ? 'bg-[#F4F0EA]' 
                                                      : cell.level === 1 ? 'bg-latte-500/40'
                                                      : cell.level === 2 ? 'bg-latte-500/70'
                                                      : cell.level === 3 ? 'bg-latte-500'
                                                      : 'bg-latte-900';
                                        return (
                                            <div key={idx} className={`grass-cell w-[14px] h-[14px] rounded-[4px] ${bgClass} transition-transform hover:scale-110 cursor-crosshair`}>
                                                <div className="tooltip">
                                                    {cell.dateStr} : {cell.totalMin > 0 ? `${fmtMinToHour(cell.totalMin)}` : '기록 없음'}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                    </div>
                </>
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
